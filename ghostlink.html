<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Ghost Link | CORE System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
        body { font-family: 'Space Mono', monospace; }
        .scanner-line {
            height: 2px;
            background: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 15px #3b82f6;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(288px); }
        }
        .compass-transition { transition: transform 0.2s cubic-bezier(0.33, 1, 0.68, 1); }
        .ghost-pulse { animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite; }
        @keyframes pulse-ring {
            0% { transform: scale(.3); opacity: 0.8; }
            80%, 100% { transform: scale(1.2); opacity: 0; }
        }
        .mode-active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: white; }
    </style>
</head>
<body class="bg-black text-zinc-300 selection:bg-blue-900 overflow-hidden">

    <div id="app" class="h-screen w-full flex flex-col p-6 max-w-md mx-auto">
        
        <header class="flex justify-between items-start mb-6">
            <div class="flex flex-col">
                <h1 class="text-xl font-bold tracking-tighter text-white flex items-center gap-2">
                    <span class="w-2 h-2 bg-blue-500 rounded-full ghost-pulse"></span>
                    GHOST LINK
                </h1>
                <p id="system-status" class="text-[8px] text-zinc-500 uppercase tracking-widest mt-1">CORE PROTOCOL ACTIVE</p>
            </div>
            <div class="text-right">
                <span id="badge-mode" class="text-[9px] text-blue-400 bg-blue-900/20 border border-blue-800/50 px-2 py-1 rounded uppercase">V2.5_DYNAMIC</span>
            </div>
        </header>

        <main class="flex-1 flex flex-col justify-center">
            
            <!-- VIEW: HOME -->
            <div id="view-home" class="space-y-6">
                <div class="border border-zinc-800 p-6 rounded-2xl bg-zinc-950/50">
                    <h2 class="text-white font-bold mb-4 text-sm tracking-widest">CONFIGURACIÓN DE RASTRO</h2>
                    
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <button id="mode-static" onclick="setMode('static')" class="mode-active border border-zinc-800 p-3 rounded-xl text-[10px] font-bold transition-all uppercase">
                            Estático
                            <span class="block text-[8px] font-normal text-zinc-500 mt-1">Huella fija</span>
                        </button>
                        <button id="mode-dynamic" onclick="setMode('dynamic')" class="border border-zinc-800 p-3 rounded-xl text-[10px] font-bold transition-all uppercase">
                            Dinámico
                            <span class="block text-[8px] font-normal text-zinc-500 mt-1">Baliza viva</span>
                        </button>
                    </div>

                    <button onclick="initGeneration()" class="w-full bg-blue-600 hover:bg-blue-500 text-white h-14 rounded-xl font-bold transition-all active:scale-95 flex items-center justify-center gap-3">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7h3a5 5 0 0 1 5 5 5 5 0 0 1-5 5h-3m-6 0H6a5 5 0 0 1-5-5 5 5 0 0 1 5-5h3"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                        GENERAR ENLACE
                    </button>
                </div>

                <div id="result-container" class="hidden space-y-4 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="p-4 bg-zinc-900 border border-blue-900/30 rounded-xl">
                        <p id="label-type" class="text-[10px] text-blue-400 mb-2 font-bold tracking-widest uppercase">Enlace Generado:</p>
                        <div id="share-url" class="text-[10px] break-all text-zinc-400 font-mono mb-4 opacity-70"></div>
                        <button onclick="copyLink()" class="w-full border border-zinc-700 h-12 rounded-lg text-xs font-bold hover:bg-zinc-800 transition-colors uppercase">
                            Copiar al portapapeles
                        </button>
                    </div>
                </div>
            </div>

            <!-- VIEW: TRACKER -->
            <div id="view-tracker" class="hidden flex-1 flex flex-col items-center justify-between py-4">
                <div class="text-center w-full">
                    <div class="flex justify-between text-[10px] text-zinc-500 mb-4 uppercase tracking-widest px-2">
                        <span id="tracker-mode-label">Static Link</span>
                        <span id="time-remaining" class="text-blue-400">EXP: --:--</span>
                    </div>
                    <div class="text-7xl font-black tracking-tighter text-white" id="dist-val">0</div>
                    <div class="text-blue-500 font-bold uppercase tracking-widest text-xs mt-2">Metros</div>
                </div>

                <div class="relative w-64 h-64 flex items-center justify-center">
                    <div class="absolute inset-0 border border-zinc-900 rounded-full"></div>
                    <div class="absolute inset-8 border border-zinc-800 rounded-full"></div>
                    <div class="scanner-line absolute w-full top-0 left-0 rounded-full opacity-20"></div>
                    <div id="arrow-container" class="compass-transition w-full h-full flex items-center justify-center">
                        <svg viewBox="0 0 100 100" class="w-16 h-16 fill-white drop-shadow-[0_0_15px_rgba(59,130,246,0.6)]">
                            <path d="M50 5 L85 85 L50 70 L15 85 Z" />
                        </svg>
                    </div>
                </div>

                <div class="text-center w-full">
                    <div id="dir-text" class="text-lg font-bold uppercase text-blue-500 tracking-tighter">CALIBRANDO...</div>
                    <p id="accuracy-text" class="text-[8px] text-zinc-600 uppercase mt-2">Precisión GPS: --</p>
                </div>

                <button onclick="location.href=window.location.pathname" class="w-full border border-zinc-800 h-12 rounded-xl text-zinc-600 text-[10px] uppercase tracking-widest mt-4">
                    Terminar Sesión
                </button>
            </div>

            <!-- VIEW: EXPIRED -->
            <div id="view-expired" class="hidden text-center space-y-6">
                <div class="text-red-500 text-5xl mb-4">✕</div>
                <h2 class="text-white font-bold text-xl uppercase">Rastro Inexistente</h2>
                <p class="text-xs text-zinc-500 leading-relaxed">El enlace ha caducado o el emisor ha cortado la señal.</p>
                <button onclick="location.href=window.location.pathname" class="w-full bg-zinc-900 h-14 rounded-xl font-bold uppercase tracking-widest text-[10px]">Reiniciar Sistema</button>
            </div>

        </main>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-blue-600 text-white text-[10px] px-6 py-3 rounded-full font-bold uppercase tracking-widest opacity-0 transition-all pointer-events-none z-50">
        Enlace copiado
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'ghost-link-v2';

        let currentMode = 'static';
        let targetCoords = null;
        let expirationTime = null;
        let deviceHeading = 0;
        let user = null;
        let trackingDocId = null;
        let isBroadcasting = false;

        // Auth initialization
        signInAnonymously(auth).catch(console.error);
        onAuthStateChanged(auth, u => { user = u; });

        window.setMode = (mode) => {
            currentMode = mode;
            document.getElementById('mode-static').className = mode === 'static' ? 'mode-active border border-blue-500 p-3 rounded-xl text-[10px] font-bold uppercase' : 'border border-zinc-800 p-3 rounded-xl text-[10px] font-bold uppercase';
            document.getElementById('mode-dynamic').className = mode === 'dynamic' ? 'mode-active border border-blue-500 p-3 rounded-xl text-[10px] font-bold uppercase' : 'border border-zinc-800 p-3 rounded-xl text-[10px] font-bold uppercase';
        };

        window.initGeneration = async () => {
            if (!user) return alert("Esperando conexión CORE...");
            if (!navigator.geolocation) return alert("GPS Incompatible");

            document.getElementById('system-status').innerText = "STATUS: LOCATING...";
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const data = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    exp: Date.now() + (30 * 60 * 1000),
                    mode: currentMode,
                    owner: user.uid
                };

                let linkParam = "";
                if (currentMode === 'static') {
                    linkParam = btoa(JSON.stringify(data));
                } else {
                    trackingDocId = `trail_${Date.now()}_${user.uid.substring(0,4)}`;
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', trackingDocId), data);
                    linkParam = `d_${trackingDocId}`;
                    startBroadcasting();
                }

                const url = `${window.location.origin}${window.location.pathname}?g=${linkParam}`;
                document.getElementById('share-url').innerText = url;
                document.getElementById('result-container').classList.remove('hidden');
                document.getElementById('system-status').innerText = `STATUS: ${currentMode.toUpperCase()} ACTIVE`;
                window.lastUrl = url;
            }, err => alert("Fallo en GPS"), { enableHighAccuracy: true });
        };

        function startBroadcasting() {
            isBroadcasting = true;
            navigator.geolocation.watchPosition(async (pos) => {
                if (!isBroadcasting || !trackingDocId) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', trackingDocId), {
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude
                    });
                } catch (e) { console.error("Signal lost", e); }
            }, null, { enableHighAccuracy: true });
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const g = params.get('g');
            if (!g) return;

            if (g.startsWith('d_')) {
                const docId = g.substring(2);
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', docId), (snapshot) => {
                    if (!snapshot.exists() || Date.now() > snapshot.data().exp) {
                        showView('expired');
                    } else {
                        const data = snapshot.data();
                        targetCoords = { lat: data.lat, lon: data.lon };
                        expirationTime = data.exp;
                        if (document.getElementById('view-tracker').classList.contains('hidden')) initTracker('dynamic');
                    }
                }, () => showView('expired'));
            } else {
                try {
                    const data = JSON.parse(atob(g));
                    if (Date.now() > data.exp) return showView('expired');
                    targetCoords = { lat: data.lat, lon: data.lon };
                    expirationTime = data.exp;
                    initTracker('static');
                } catch(e) { showView('expired'); }
            }
        };

        function initTracker(mode) {
            showView('tracker');
            document.getElementById('tracker-mode-label').innerText = `${mode} link`;
            
            // Compass Calibration
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const btn = document.createElement('button');
                btn.className = "fixed inset-0 z-[100] bg-black text-white font-bold uppercase tracking-widest text-[10px]";
                btn.innerText = "TAP TO CALIBRATE COMPASS";
                document.body.appendChild(btn);
                btn.onclick = () => {
                    DeviceOrientationEvent.requestPermission().then(res => {
                        if (res === 'granted') {
                            window.addEventListener('deviceorientation', e => deviceHeading = e.webkitCompassHeading || (360 - e.alpha));
                            btn.remove();
                        }
                    });
                };
            } else {
                window.addEventListener('deviceorientation', e => deviceHeading = e.webkitCompassHeading || (360 - e.alpha));
            }

            navigator.geolocation.watchPosition(pos => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, targetCoords.lat, targetCoords.lon);
                const bearing = calculateBearing(pos.coords.latitude, pos.coords.longitude, targetCoords.lat, targetCoords.lon);
                updateUI(dist, bearing, pos.coords.accuracy);
            }, null, { enableHighAccuracy: true });

            setInterval(() => {
                const rem = expirationTime - Date.now();
                if (rem <= 0) location.reload();
                const m = Math.floor(rem/60000);
                const s = Math.floor((rem%60000)/1000);
                document.getElementById('time-remaining').innerText = `EXP: ${m}:${s.toString().padStart(2,'0')}`;
            }, 1000);
        }

        function updateUI(dist, bearing, accuracy) {
            document.getElementById('dist-val').innerText = Math.round(dist);
            document.getElementById('accuracy-text').innerText = `Precisión GPS: ${Math.round(accuracy)}m`;
            const angle = (bearing - deviceHeading + 360) % 360;
            document.getElementById('arrow-container').style.transform = `rotate(${angle}deg)`;
            
            const dt = document.getElementById('dir-text');
            if (dist < 6) {
                dt.innerText = "OBJETIVO AQUÍ";
                dt.style.color = "#22c55e";
            } else {
                dt.style.color = "#3b82f6";
                if (angle < 30 || angle > 330) dt.innerText = "ADELANTE";
                else if (angle < 150) dt.innerText = "DERECHA";
                else if (angle < 210) dt.innerText = "DETRÁS";
                else dt.innerText = "IZQUIERDA";
            }
        }

        // Utils
        function showView(id) {
            ['home', 'tracker', 'expired'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }

        window.copyLink = () => {
            const el = document.createElement('textarea');
            el.value = window.lastUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            const t = document.getElementById('toast');
            t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 2000);
        };

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180, dl = (lon2-lon1)*Math.PI/180;
            const y = Math.sin(dl) * Math.cos(p2);
            const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }
    </script>
</body>
</html>
