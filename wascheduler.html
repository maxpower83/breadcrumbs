<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GHOSTWRITER V4 | CRITICAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: #000; color: #00ff41; font-family: 'JetBrains+Mono', monospace; overflow: hidden; }
        .input-core { background: #050505; border: 1px solid #00ff41; color: #00ff41; outline: none; }
        .surface-trigger { height: 70vh; cursor: pointer; border: 2px solid #ff0000; background: rgba(255,0,0,0.05); }
        .blink-red { animation: blinker 0.4s linear infinite; color: #ff0000; }
        @keyframes blinker { 50% { opacity: 0; } }
        #permission-overlay { background: rgba(0,0,0,0.95); z-index: 100; }
    </style>
</head>
<body class="h-screen flex flex-col p-4">

    <!-- OVERLAY DE PERMISOS CRÍTICOS -->
    <div id="permission-overlay" class="fixed inset-0 flex flex-col items-center justify-center p-6 text-center">
        <h2 class="text-xl font-bold mb-4 uppercase tracking-tighter">System Access Required</h2>
        <p class="text-[10px] text-zinc-500 mb-8 uppercase">Para despertar el dispositivo y emitir alertas en la pantalla de bloqueo, se requiere autorización de nivel ARCHITECT.</p>
        <button onclick="enableSystems()" class="bg-[#00ff41] text-black font-bold py-4 px-8 rounded-none uppercase text-xs">
            Enable System Alerts
        </button>
    </div>

    <header class="mb-4 border-b border-[#00ff4133] pb-2 flex justify-between items-end">
        <div>
            <h1 class="text-lg font-bold uppercase tracking-tighter">The Ghostwriter</h1>
            <p class="text-[8px] text-zinc-500 uppercase font-bold">Execution Engine V4.0</p>
        </div>
        <div id="sys-clock" class="text-xs font-bold">00:00:00</div>
    </header>

    <main id="setup-view" class="space-y-4">
        <div class="border border-[#00ff4133] p-4 space-y-3">
            <input type="tel" id="phone" placeholder="PHONE: 34600000000" class="w-full p-2 text-xs input-core">
            <textarea id="msg" rows="2" placeholder="PAYLOAD..." class="w-full p-2 text-xs input-core resize-none"></textarea>
            <div class="flex gap-2">
                <input type="datetime-local" id="time" class="flex-grow p-2 text-xs input-core">
                <button onclick="commit()" class="bg-[#00ff41] text-black px-4 text-[10px] font-bold uppercase">Commit</button>
            </div>
        </div>
        <div id="task-list" class="space-y-2 text-[10px]"></div>
    </main>

    <!-- VISTA DE DISPARO (CRITICAL) -->
    <div id="trigger-view" class="hidden flex-grow flex flex-col">
        <div class="text-center mb-4">
            <div class="blink-red font-bold text-xl uppercase tracking-widest">! EXECUTION REQUIRED !</div>
            <p id="trigger-meta" class="text-[9px] text-zinc-400"></p>
        </div>
        <div onclick="execute()" class="surface-trigger flex items-center justify-center">
            <div class="text-center">
                <div class="text-xs font-bold uppercase tracking-[0.4em] text-white">Unlock & Tap Here</div>
                <div class="text-[8px] mt-2 opacity-50 uppercase">Securing WhatsApp Tunnel...</div>
            </div>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('ghost_v4') || '[]');
        let activeTask = null;
        let audioCtx = null;

        function enableSystems() {
            // Inicializar Audio Context por interacción de usuario
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Solicitar Permisos de Notificación
            if ("Notification" in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        document.getElementById('permission-overlay').classList.add('hidden');
                        new Notification("GHOSTWRITER ACTIVE", { body: "System monitoring initialized." });
                    }
                });
            }
        }

        function commit() {
            const t = {
                id: Date.now(),
                phone: document.getElementById('phone').value.replace(/\D/g, ''),
                msg: document.getElementById('msg').value,
                time: new Date(document.getElementById('time').value).getTime()
            };
            if(!t.phone || !t.msg || isNaN(t.time)) return;
            tasks.push(t);
            localStorage.setItem('ghost_v4', JSON.stringify(tasks));
            render();
        }

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.sort((a,b)=>a.time-b.time).map(t => `
                <div class="border border-zinc-800 p-2 flex justify-between">
                    <span>+${t.phone} | ${new Date(t.time).toLocaleTimeString()}</span>
                    <button onclick="del(${t.id})" class="text-red-900">REMOVE</button>
                </div>
            `).join('');
        }

        setInterval(() => {
            const now = Date.now();
            document.getElementById('sys-clock').innerText = new Date().toLocaleTimeString();
            
            const next = tasks.find(t => now >= t.time);
            if(next && !activeTask) fireAlert(next);
        }, 1000);

        function fireAlert(task) {
            activeTask = task;
            
            // 1. Notificación de Sistema (Aparece en pantalla de bloqueo)
            if (Notification.permission === "granted") {
                new Notification("! WHATSAPP PENDING !", {
                    body: `Target: +${task.phone}. Tap to execute.`,
                    requireInteraction: true,
                    silent: false
                }).onclick = () => { window.focus(); };
            }

            // 2. Alerta Sonora (Saturación de frecuencia para despertar)
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.value = 880;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 1.5);
            }

            // 3. UI Update
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('trigger-view').classList.remove('hidden');
            document.getElementById('trigger-meta').innerText = `SEND TO: +${task.phone}`;
            
            // Vibración Crítica
            if ("vibrate" in navigator) navigator.vibrate([500, 200, 500, 200, 1000]);
        }

        function execute() {
            if(!activeTask) return;
            window.location.href = `whatsapp://send?phone=${activeTask.phone}&text=${encodeURIComponent(activeTask.msg)}`;
            tasks = tasks.filter(t => t.id !== activeTask.id);
            localStorage.setItem('ghost_v4', JSON.stringify(tasks));
            reset();
        }

        function reset() {
            activeTask = null;
            document.getElementById('setup-view').classList.remove('hidden');
            document.getElementById('trigger-view').classList.add('hidden');
            render();
        }

        function del(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('ghost_v4', JSON.stringify(tasks));
            render();
        }

        render();
    </script>
</body>
</html>
