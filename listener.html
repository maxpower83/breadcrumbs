<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LISTENER - Extracción Resolutiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
            touch-action: manipulation;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
        }
        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 5px;
            background-color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
        }
        @keyframes dot-flashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        .line-clamp-custom {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body class="min-h-screen p-4">
    <div class="max-w-2xl mx-auto flex flex-col h-[92vh]">
        <!-- Header -->
        <header class="mb-4 border-l-4 border-blue-600 pl-4 shrink-0">
            <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">LISTENER</h1>
            <p class="text-zinc-500 text-[9px] tracking-[0.2em] uppercase">Extracción Resolutiva en Tiempo Real</p>
        </header>

        <!-- Main Interface -->
        <div class="flex-1 flex flex-col gap-4 overflow-hidden">
            
            <!-- STT Stream -->
            <div class="terminal-box rounded p-3 h-1/3 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Audio_Input</span>
                    <div id="status-dot" class="hidden h-2 w-2 bg-red-600 rounded-full animate-pulse"></div>
                </div>
                <div id="transcript-box" class="flex-1 overflow-y-auto text-[11px] leading-relaxed text-zinc-500 font-mono italic">
                    SISTEMA_STANDBY: Esperando señal...
                </div>
            </div>

            <!-- Resolutive Output -->
            <div class="terminal-box rounded p-3 h-2/3 border-blue-900/30 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-bold text-blue-400 uppercase tracking-widest">Puntos_Resolutivos</span>
                    <div id="ai-loading" class="hidden"><div class="dot-flashing"></div></div>
                </div>
                <div id="resolutive-box" class="flex-1 overflow-y-auto space-y-3">
                    <ul id="points-list" class="space-y-2"></ul>
                    <div id="placeholder-text" class="text-[10px] text-zinc-800 text-center mt-12 uppercase tracking-[0.3em]">
                        Escuchando acuerdos y decisiones...
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-4 shrink-0 grid grid-cols-2 gap-2">
            <button id="start-btn" class="col-span-2 bg-blue-600 active:bg-blue-800 text-white font-bold py-4 rounded text-xs uppercase tracking-widest transition-colors">
                Iniciar Captura
            </button>
            <button id="stop-btn" class="hidden col-span-1 bg-zinc-900 text-zinc-400 font-bold py-4 rounded text-xs uppercase tracking-widest border border-zinc-800">
                Detener
            </button>
            <button id="clear-btn" class="hidden col-span-1 bg-zinc-900 text-red-900 font-bold py-4 rounded text-xs uppercase tracking-widest border border-zinc-800">
                Limpiar
            </button>
        </div>

        <footer class="mt-4 shrink-0">
            <p class="text-[8px] text-zinc-700 uppercase tracking-tighter text-center">
                Ignora fundamentos • Filtra contexto • Solo resultados finales
            </p>
        </footer>
    </div>

    <script>
        const apiKey = ""; // La clave se inyecta automáticamente en el entorno
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        let recognition;
        let fullTranscript = "";
        let bufferText = "";
        const BUFFER_LIMIT = 250; // Caracteres mínimos para procesar un bloque

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const statusDot = document.getElementById('status-dot');
        const placeholderText = document.getElementById('placeholder-text');
        const aiLoading = document.getElementById('ai-loading');

        // Inicializar Reconocimiento de Voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const text = event.results[i][0].transcript;
                        fullTranscript += text + ' ';
                        bufferText += text + ' ';
                        
                        if (bufferText.length > BUFFER_LIMIT) {
                            fetchResolutivePoints(bufferText);
                            bufferText = ""; 
                        }
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = `<span>${fullTranscript}</span><span class="text-blue-500">${interim}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };

            recognition.onerror = (e) => {
                console.error("Speech Error", e);
                if (e.error === 'not-allowed') alert("Permiso de micrófono denegado.");
            };
        }

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function fetchResolutivePoints(text) {
            placeholderText.classList.add('hidden');
            aiLoading.classList.remove('hidden');

            const systemPrompt = "ERES UN EXTRACTOR RESOLUTIVO. Tu única función es identificar ACUERDOS, DECISIONES, PLAZOS o RESPONSABLES. Ignora opiniones, fundamentos legales, introducciones, agradecimientos y relleno retórico. Si no hay una decisión clara en el texto, no devuelvas nada. Formato: Una sola oración directa por punto.";

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Analiza este fragmento y extrae únicamente los puntos resolutivos o decisiones tomadas: "${text}"` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;

                if (aiResponse && aiResponse.trim().length > 3) {
                    const cleanPoints = aiResponse.split('\n').filter(p => p.trim().length > 5);
                    
                    cleanPoints.forEach(point => {
                        const li = document.createElement('li');
                        li.className = "bg-zinc-900/80 p-3 rounded border-l-2 border-blue-500 text-[11px] text-zinc-100 font-bold uppercase tracking-tight leading-tight shadow-sm";
                        li.innerText = point.replace(/^[•\-\*]\s*/, '').trim();
                        pointsList.appendChild(li);
                    });

                    document.getElementById('resolutive-box').scrollTop = document.getElementById('resolutive-box').scrollHeight;
                }
            } catch (e) {
                console.error("API Error", e);
            } finally {
                aiLoading.classList.add('hidden');
            }
        }

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            clearBtn.classList.remove('hidden');
            statusDot.classList.remove('hidden');
            transcriptBox.innerText = "ESCUCHANDO...";
        });

        stopBtn.addEventListener('click', () => {
            recognition.stop();
            startBtn.classList.remove('hidden');
            stopBtn.classList.add('hidden');
            statusDot.classList.add('hidden');
        });

        clearBtn.addEventListener('click', () => {
            fullTranscript = "";
            bufferText = "";
            transcriptBox.innerText = "LIMPIEZA_COMPLETA...";
            pointsList.innerHTML = "";
            placeholderText.classList.remove('hidden');
        });
    </script>
</body>
</html>
