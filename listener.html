<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LISTENER V4 - Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
            touch-action: manipulation;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
        }
        .dot-flashing {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
        }
        @keyframes dot-flashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col">
    <div class="max-w-2xl mx-auto w-full flex flex-col h-[95vh]">
        
        <header class="mb-4 border-l-4 border-blue-600 pl-4 shrink-0">
            <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">LISTENER V4</h1>
            <p class="text-zinc-500 text-[9px] tracking-[0.2em] uppercase font-bold text-blue-400">Motor: Gemini 2.5 Flash Preview</p>
        </header>

        <div class="flex-1 flex flex-col gap-4 overflow-hidden">
            <!-- Audio Input -->
            <div class="terminal-box rounded p-3 h-1/2 flex flex-col border-zinc-800">
                <div class="flex justify-between items-center mb-2 text-[9px] font-bold text-zinc-500 uppercase">
                    <span>Transmisión_Voz</span>
                    <div id="status-label" class="hidden text-red-600 animate-pulse flex items-center gap-1">
                        <span>● REC</span>
                    </div>
                </div>
                <div id="transcript-box" class="flex-1 overflow-y-auto text-[13px] leading-snug text-zinc-400 font-mono italic">
                    Esperando operador...
                </div>
            </div>

            <!-- AI Output -->
            <div class="terminal-box rounded p-3 h-1/2 border-blue-900/30 flex flex-col">
                <div class="flex justify-between items-center mb-2 text-[9px] font-bold text-blue-400 uppercase">
                    <span>Resoluciones_Extraídas</span>
                    <div id="ai-loading" class="hidden"><div class="dot-flashing"></div></div>
                </div>
                <div id="resolutive-box" class="flex-1 overflow-y-auto">
                    <ul id="points-list" class="space-y-3"></ul>
                    <div id="placeholder-text" class="text-[10px] text-zinc-800 text-center mt-20 uppercase tracking-[0.3em]">
                        Listo para procesar resumen...
                    </div>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="mt-4 grid grid-cols-1 gap-2 shrink-0">
            <button id="start-btn" class="bg-blue-600 text-white font-bold py-5 rounded text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">
                Iniciar Grabación
            </button>
            <button id="finish-btn" class="hidden bg-white text-black font-bold py-5 rounded text-xs uppercase tracking-widest">
                Finalizar y Extraer
            </button>
            <button id="reset-btn" class="hidden bg-zinc-900 text-zinc-500 font-bold py-3 rounded text-[10px] uppercase tracking-widest border border-zinc-800">
                Reiniciar Sistema
            </button>
        </div>
    </div>

    <script>
        const apiKey = ""; // Se mantiene vacío para inyección de runtime
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        let recognition;
        let finalTranscript = "";
        let isRecording = false;

        const startBtn = document.getElementById('start-btn');
        const finishBtn = document.getElementById('finish-btn');
        const resetBtn = document.getElementById('reset-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const statusLabel = document.getElementById('status-label');
        const placeholderText = document.getElementById('placeholder-text');
        const aiLoading = document.getElementById('ai-loading');

        // Inicialización de Reconocimiento de Voz
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                transcriptBox.innerHTML = `<span class="text-zinc-200">${finalTranscript}</span><span class="text-blue-600">${interimTranscript}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };

            recognition.onend = () => {
                if (isRecording) {
                    try { recognition.start(); } catch(e) { console.warn("Re-start failed"); }
                }
            };
        } else {
            transcriptBox.innerText = "ERROR: Navegador no soporta Speech Recognition.";
        }

        async function processSummary() {
            const cleanText = finalTranscript.trim();
            if (!cleanText) return;

            aiLoading.classList.remove('hidden');
            placeholderText.classList.add('hidden');
            pointsList.innerHTML = "";
            
            const systemPrompt = "Eres un relator estricto. Analiza el discurso y extrae SOLO los puntos resolutivos, acuerdos, decisiones firmes, fechas límite y responsables. IGNORA: justificaciones, fundamentos legales, introducciones, agradecimientos y retórica política. Responde exclusivamente con una lista de puntos ejecutivos.";

            const payload = {
                contents: [{ 
                    parts: [{ text: `Extrae la parte resolutiva del siguiente discurso: ${cleanText}` }] 
                }],
                systemInstruction: { 
                    parts: [{ text: systemPrompt }] 
                }
            };

            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errBody = await response.json().catch(() => ({}));
                        throw new Error(errBody.error?.message || `HTTP ${response.status}`);
                    }
                    
                    const data = await response.json();
                    const aiResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (aiResponse) {
                        const lines = aiResponse.split('\n')
                                        .filter(l => l.trim().length > 3)
                                        .map(l => l.replace(/^[•\-\*#\d\.]+\s*/, '').trim());
                        
                        pointsList.innerHTML = lines.map(line => `
                            <li class="bg-zinc-900/80 p-4 rounded border-l-4 border-blue-500 text-[12px] text-white font-bold uppercase leading-tight tracking-tight mb-2 shadow-lg">
                                ${line}
                            </li>
                        `).join('');
                        if (lines.length === 0) pointsList.innerHTML = `<li class="text-zinc-600 text-[10px]">No se detectaron resoluciones claras.</li>`;
                    }
                    break; // Éxito, salir del bucle

                } catch (e) {
                    retries--;
                    if (retries === 0) {
                        pointsList.innerHTML = `<li class="text-red-500 text-[10px] bg-red-900/20 p-3 rounded border border-red-900">
                            ERROR_IA: ${e.message}<br>Verifica que la API Key esté activa y el servicio disponible.
                        </li>`;
                    } else {
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                } finally {
                    if (retries === 0 || pointsList.innerHTML !== "") aiLoading.classList.add('hidden');
                }
            }
        }

        startBtn.addEventListener('click', () => {
            isRecording = true;
            finalTranscript = "";
            transcriptBox.innerText = "CAPTURANDO AUDIO...";
            recognition.start();
            startBtn.classList.add('hidden');
            finishBtn.classList.remove('hidden');
            statusLabel.classList.remove('hidden');
        });

        finishBtn.addEventListener('click', () => {
            isRecording = false;
            recognition.stop();
            finishBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            statusLabel.classList.add('hidden');
            processSummary();
        });

        resetBtn.addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>
