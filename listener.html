<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listener</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
        }
        .dot-flashing {
            position: relative;
            width: 8px;
            height: 8px;
            border-radius: 5px;
            background-color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
        }
        @keyframes dot-flashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #27272a; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <header class="mb-8 border-l-4 border-blue-600 pl-6">
            <div class="flex items-center gap-2 text-blue-500 mb-1">
                <a href="index.html" class="hover:underline text-[10px] font-bold uppercase tracking-[0.2em]">← Volver al HUB</a>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tighter uppercase italic">LISTENER</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.3em] uppercase">Módulo de Extracción Resolutiva V 1.0</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Columna STT -->
            <div class="space-y-4">
                <div class="terminal-box rounded p-4">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[10px] font-bold text-zinc-500 tracking-widest uppercase italic">Audio_Stream</span>
                        <div id="status-dot" class="hidden h-2 w-2 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_#ef4444]"></div>
                    </div>
                    <div id="transcript-box" class="h-48 md:h-64 overflow-y-auto text-xs leading-relaxed text-zinc-400 font-mono">
                        SISTEMA_LISTO: Esperando inicialización de operador...
                    </div>
                </div>

                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded text-xs uppercase tracking-[0.2em] transition-all border border-blue-400/50">
                    Iniciar Captura
                </button>
                <button id="stop-btn" class="hidden w-full bg-zinc-900 hover:bg-zinc-800 text-zinc-400 font-bold py-4 rounded text-xs uppercase tracking-[0.2em] border border-zinc-700 transition-all">
                    Finalizar Sesión
                </button>
            </div>

            <!-- Columna IA -->
            <div class="terminal-box rounded p-4 border-blue-900/30">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[10px] font-bold text-blue-400 tracking-widest uppercase italic">Puntos_Resolutivos</span>
                    <div id="ai-loading" class="hidden"><div class="dot-flashing"></div></div>
                </div>
                <div id="resolutive-box" class="h-80 md:h-[400px] overflow-y-auto space-y-4">
                    <ul id="points-list" class="space-y-3">
                        <!-- Inyección de puntos -->
                    </ul>
                    <div id="placeholder-text" class="text-[10px] text-zinc-700 italic text-center mt-20 uppercase tracking-widest">
                        Escaneando discurso en busca de acuerdos...
                    </div>
                </div>
            </div>
        </div>

        <footer class="mt-8 pt-4 border-t border-zinc-900">
            <p class="text-[9px] text-zinc-600 uppercase leading-loose tracking-widest">
                Protocolo: Omisión de fundamentos / Captura de decisiones / Plazos / Responsables.
            </p>
        </footer>
    </div>

    <script>
        const apiKey = "TU_API_KEY_AQUÍ"; 
        let recognition;
        let fullTranscript = "";
        let bufferText = "";
        const BUFFER_LIMIT = 280;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const statusDot = document.getElementById('status-dot');
        const placeholderText = document.getElementById('placeholder-text');
        const aiLoading = document.getElementById('ai-loading');

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const text = event.results[i][0].transcript;
                        fullTranscript += text + ' ';
                        bufferText += text + ' ';
                        if (bufferText.length > BUFFER_LIMIT) {
                            processResolutive(bufferText);
                            bufferText = ""; 
                        }
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = `<span>${fullTranscript}</span><span class="text-blue-600 italic">${interim}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };
        }

        async function processResolutive(text) {
            placeholderText.classList.add('hidden');
            aiLoading.classList.remove('hidden');

            const systemPrompt = "Actúa como relator. Extrae SOLO los puntos resolutivos, decisiones o acuerdos. Ignora fundamentos, saludos y contexto. Sé extremadamente directo.";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Extrae lo resolutivo: ${text}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();
                const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                if (aiText && aiText.trim().length > 5) {
                    const li = document.createElement('li');
                    li.className = "bg-zinc-900/50 p-3 rounded border-l-2 border-blue-500 text-xs text-zinc-200 leading-relaxed";
                    li.innerText = aiText.replace(/[*#]/g, '').trim();
                    pointsList.appendChild(li);
                    document.getElementById('resolutive-box').scrollTop = document.getElementById('resolutive-box').scrollHeight;
                }
            } catch (e) { console.error("API_ERR", e); }
            finally { aiLoading.classList.add('hidden'); }
        }

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
            statusDot.classList.remove('hidden');
            transcriptBox.innerText = "CAPTURA_ACTIVA...";
        });

        stopBtn.addEventListener('click', () => {
            recognition.stop();
            location.reload(); // Reset limpio
        });
    </script>
</body>
    </html>
