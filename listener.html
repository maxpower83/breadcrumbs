
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transcripción Resolutiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans">

    <header class="p-4 border-b border-gray-800 bg-gray-900 sticky top-0 z-10">
        <h1 class="text-xl font-bold text-blue-400">Transcripción Resolutiva</h1>
        <p class="text-xs text-gray-400">Uso interno - Procesamiento Gemini</p>
    </header>

    <main class="flex-1 p-4 space-y-4 overflow-y-auto">
        <!-- Configuración API -->
        <div id="api-config" class="bg-gray-800 p-4 rounded-lg border border-gray-700">
            <label class="block text-sm font-medium mb-2">API Key de Gemini</label>
            <input type="password" id="api-key" placeholder="Pega tu API key aquí..." 
                class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <p class="text-[10px] text-gray-500 mt-2 italic">Se guarda solo en la sesión del navegador.</p>
        </div>

        <!-- Estado y Control -->
        <div class="flex items-center justify-between gap-4">
            <button id="start-btn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold transition-all disabled:opacity-50">
                Iniciar Escucha
            </button>
            <button id="stop-btn" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-bold transition-all hidden">
                Detener y Procesar
            </button>
        </div>

        <!-- Transcripción en vivo -->
        <div class="space-y-2">
            <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider text-xs">Voz detectada (Borrador)</h2>
            <div id="live-transcript" class="bg-black/30 p-3 rounded-lg min-h-[100px] text-sm text-gray-300 border border-dashed border-gray-700 italic">
                Esperando audio...
            </div>
        </div>

        <!-- Resultado Final -->
        <div class="space-y-2">
            <h2 class="text-sm font-semibold text-blue-400 uppercase tracking-wider text-xs">Puntos Resolutivos</h2>
            <div id="final-result" class="bg-gray-800 p-4 rounded-lg min-h-[150px] border border-blue-900/30 whitespace-pre-wrap leading-relaxed shadow-lg text-white">
                Aquí aparecerá el resumen ejecutivo una vez procesado.
            </div>
        </div>

        <div id="loading" class="hidden flex items-center justify-center gap-2 text-blue-400 py-4">
            <div class="w-2 h-2 bg-blue-400 rounded-full pulse"></div>
            <span class="text-sm font-medium">IA extrayendo resoluciones...</span>
        </div>
    </main>

    <footer class="p-4 text-center">
        <button id="copy-btn" class="text-xs text-gray-500 underline">Copiar resultado al portapapeles</button>
    </footer>

    <script>
        let recognition;
        let fullTranscript = "";
        let isListening = false;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const liveTranscriptDiv = document.getElementById('live-transcript');
        const finalResultDiv = document.getElementById('final-result');
        const loadingDiv = document.getElementById('loading');
        const apiKeyInput = document.getElementById('api-key');

        // Inicializar reconocimiento de voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'es-AR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onresult = (event) => {
                let interimTranscript = "";
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        fullTranscript += event.results[i][0].transcript + " ";
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                liveTranscriptDiv.innerText = fullTranscript + interimTranscript;
                liveTranscriptDiv.scrollTop = liveTranscriptDiv.scrollHeight;
            };

            recognition.onerror = (event) => {
                console.error("Error de reconocimiento:", event.error);
                if(event.error === 'not-allowed') alert("Permiso de micrófono denegado.");
            };
        } else {
            alert("Tu navegador no soporta reconocimiento de voz. Usa Chrome en Android o Safari en iOS.");
        }

        startBtn.onclick = () => {
            if (!apiKeyInput.value) {
                alert("Por favor, ingresa tu API Key primero.");
                return;
            }
            fullTranscript = "";
            liveTranscriptDiv.innerText = "Escuchando...";
            recognition.start();
            isListening = true;
            startBtn.classList.add('hidden');
            stopBtn.classList.remove('hidden');
        };

        stopBtn.onclick = async () => {
            recognition.stop();
            isListening = false;
            stopBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
            
            if (fullTranscript.trim().length < 10) {
                finalResultDiv.innerText = "Texto demasiado corto para procesar.";
                return;
            }

            await processWithGemini(fullTranscript);
        };

        async function processWithGemini(text) {
            loadingDiv.classList.remove('hidden');
            const apiKey = apiKeyInput.value;
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;

            const systemPrompt = `Actúa como un relator de actas jurídicas y administrativas. 
            Tu tarea es recibir una transcripción en bruto de un discurso y extraer ÚNICAMENTE la parte resolutiva y los puntos esenciales. 
            OMITE: fundamentos, anécdotas, introducciones, agradecimientos y retórica innecesaria. 
            FORMATO: Lista de puntos claros y directos. Si no hay decisiones tomadas, resume los compromisos asumidos. 
            Idioma: Español. Estilo: Directo y profesional.`;

            const payload = {
                contents: [{ parts: [{ text: `Transcripción: ${text}` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    
                    const data = await response.json();
                    const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                    finalResultDiv.innerText = resultText || "No se pudo extraer información resolutiva.";
                    loadingDiv.classList.add('hidden');
                    return;
                } catch (error) {
                    if (i === 4) {
                        finalResultDiv.innerText = "Error tras varios intentos. Verifica tu API Key o conexión.";
                        loadingDiv.classList.add('hidden');
                    }
                    await new Promise(resolve => setTimeout(resolve, delay));
                    delay *= 2;
                }
            }
        }

        document.getElementById('copy-btn').onclick = () => {
            const text = finalResultDiv.innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert("Copiado!");
        };
    </script>
</body>
</html>
