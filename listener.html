
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analizador Resolutivo Real-Time</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot-flashing {
            display: inline-block;
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #3b82f6;
            color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: .5s;
        }
        @keyframes dot-flashing {
            0% { background-color: #3b82f6; }
            50%, 100% { background-color: #ebe6ff; }
        }
        #results-container {
            height: calc(100vh - 320px);
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

    <div class="max-w-md mx-auto p-4 flex flex-col h-screen">
        <header class="mb-4">
            <h1 class="text-xl font-bold text-blue-400">Extractor Resolutivo</h1>
            <p class="text-xs text-gray-400">Filtra fundamentos, captura decisiones.</p>
        </header>

        <!-- Configuración de API Key -->
        <section class="mb-4 bg-gray-800 p-3 rounded-lg shadow-inner">
            <label class="block text-xs font-semibold text-gray-400 mb-1">GEMINI API KEY</label>
            <input type="password" id="api-key" placeholder="Introduce tu API Key aquí" 
                   class="w-full bg-gray-700 border-none rounded p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
        </section>

        <!-- Controles -->
        <div class="flex gap-2 mb-4">
            <button id="start-btn" class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                </svg>
                Iniciar
            </button>
            <button id="stop-btn" disabled class="flex-1 bg-red-600 hover:bg-red-700 disabled:bg-gray-600 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 10a1 1 0 011-1h4a1 1 0 011 1v4a1 1 0 01-1 1H10a1 1 0 01-1-1v-4z" />
                </svg>
                Detener
            </button>
        </div>

        <!-- Estado -->
        <div id="status" class="text-xs mb-2 text-center text-gray-500 italic">Listo para escuchar</div>

        <!-- Resultados -->
        <div id="results-container" class="flex-1 bg-gray-800 rounded-lg p-4 overflow-y-auto border border-gray-700 space-y-4">
            <div id="placeholder-msg" class="text-gray-500 text-center mt-10">
                La síntesis resolutiva aparecerá aquí...
            </div>
            <!-- Los bloques de texto aparecerán aquí -->
        </div>

        <footer class="mt-4 pb-2">
            <button id="clear-btn" class="w-full text-xs text-gray-500 underline">Limpiar historial</button>
        </footer>
    </div>

    <!-- Modal de error -->
    <div id="error-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
        <div class="bg-gray-800 p-6 rounded-xl border border-red-500 max-w-xs w-full text-center">
            <h2 class="text-red-400 font-bold mb-2">Error</h2>
            <p id="error-text" class="text-sm text-gray-300 mb-4"></p>
            <button onclick="document.getElementById('error-modal').classList.add('hidden')" class="bg-red-600 px-4 py-2 rounded text-sm">Cerrar</button>
        </div>
    </div>

    <script>
        let recognition;
        let isRecording = false;
        let accumulatedText = "";
        const BUFFER_LIMIT = 200; // Caracteres mínimos para enviar a procesar

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const apiKeyInput = document.getElementById('api-key');
        const resultsContainer = document.getElementById('results-container');
        const statusDiv = document.getElementById('status');
        const placeholderMsg = document.getElementById('placeholder-msg');

        // Inicializar reconocimiento de voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        accumulatedText += event.results[i][0].transcript + " ";
                        checkBuffer();
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                statusDiv.innerHTML = `Escuchando... <span class="text-blue-400">${interimTranscript}</span>`;
            };

            recognition.onerror = (event) => {
                showError("Error de reconocimiento: " + event.error);
                stopRecording();
            };

            recognition.onend = () => {
                if (isRecording) recognition.start(); // Reiniciar si se detiene solo
            };
        } else {
            showError("Tu navegador no soporta reconocimiento de voz.");
            startBtn.disabled = true;
        }

        startBtn.onclick = () => {
            const key = apiKeyInput.value.trim();
            if (!key) {
                showError("Por favor, ingresa tu Gemini API Key.");
                return;
            }
            startRecording();
        };

        stopBtn.onclick = () => {
            stopRecording();
            // Procesar lo que haya quedado en el buffer
            if (accumulatedText.trim().length > 5) {
                processWithGemini(accumulatedText);
                accumulatedText = "";
            }
        };

        document.getElementById('clear-btn').onclick = () => {
            resultsContainer.innerHTML = '<div id="placeholder-msg" class="text-gray-500 text-center mt-10">La síntesis resolutiva aparecerá aquí...</div>';
        };

        function startRecording() {
            isRecording = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            accumulatedText = "";
            placeholderMsg?.remove();
            recognition.start();
            statusDiv.textContent = "Micrófono activo...";
        }

        function stopRecording() {
            isRecording = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            recognition.stop();
            statusDiv.textContent = "Detenido.";
        }

        function checkBuffer() {
            if (accumulatedText.length >= BUFFER_LIMIT) {
                const textToProcess = accumulatedText;
                accumulatedText = "";
                processWithGemini(textToProcess);
            }
        }

        async function processWithGemini(text, retries = 0) {
            const apiKey = apiKeyInput.value.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const systemPrompt = "Eres un transcriptor jurídico/administrativo. Tu tarea es extraer EXCLUSIVAMENTE la parte resolutiva y los puntos esenciales del discurso que se te entregue. Omite introducciones, fundamentos, retórica, saludos y divagaciones. Si el fragmento no contiene una resolución o punto esencial, responde únicamente con '---'. Formato: Viñetas concisas.";
            
            const payload = {
                contents: [{ parts: [{ text: `Fragmento de discurso: "${text}"` }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            // Crear entrada visual de "procesando"
            const loadingId = "loader-" + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = "bg-gray-700 p-3 rounded border-l-4 border-blue-500 animate-pulse text-sm text-gray-400";
            loadingDiv.textContent = "Analizando bloque...";
            resultsContainer.appendChild(loadingDiv);
            resultsContainer.scrollTop = resultsContainer.scrollHeight;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    if (response.status === 429 && retries < 5) {
                        const delay = Math.pow(2, retries) * 1000;
                        setTimeout(() => processWithGemini(text, retries + 1), delay);
                        return;
                    }
                    throw new Error(`Error API: ${response.status}`);
                }

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "Sin respuesta";
                
                loadingDiv.remove();
                
                if (resultText.trim() !== "---") {
                    const entry = document.createElement('div');
                    entry.className = "bg-gray-700 p-3 rounded border-l-4 border-green-500 shadow-sm";
                    entry.innerHTML = `<div class="text-xs text-gray-500 mb-1 uppercase font-bold tracking-widest">${new Date().toLocaleTimeString()}</div>
                                       <div class="text-sm leading-relaxed">${resultText.replace(/\n/g, '<br>')}</div>`;
                    resultsContainer.appendChild(entry);
                    resultsContainer.scrollTop = resultsContainer.scrollHeight;
                }

            } catch (error) {
                loadingDiv.className = "bg-red-900/30 p-2 rounded text-xs text-red-400";
                loadingDiv.textContent = "Fallo en procesamiento: " + error.message;
            }
        }

        function showError(msg) {
            document.getElementById('error-text').textContent = msg;
            document.getElementById('error-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
