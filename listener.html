<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Listener | CORE-SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
            overflow-x: hidden;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #18181b;
        }
        .resolutive-item {
            animation: slideIn 0.3s ease-out;
            border-left: 3px solid #3b82f6;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .pulse-blue {
            box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
            animation: pulse-blue 2s infinite;
        }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
        }
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #27272a; }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col items-center">
    <div class="w-full max-w-2xl flex flex-col gap-4">
        <!-- Header Táctico -->
        <header class="flex justify-between items-end border-b border-zinc-900 pb-2">
            <div>
                <h1 class="text-xl font-bold text-white tracking-tighter italic italic">LISTENER <span class="text-blue-500 text-[10px] not-italic ml-2 font-mono">v2.0</span></h1>
                <p class="text-[9px] text-zinc-600 uppercase tracking-widest">Extracción de acuerdos en tiempo real</p>
            </div>
            <a href="index.html" class="text-[9px] text-zinc-500 hover:text-blue-400 border border-zinc-800 px-2 py-1 rounded">HUB</a>
        </header>

        <!-- Monitor de Transcripción (Minimizado en móvil para dar espacio) -->
        <div class="terminal-box rounded p-3 h-32 relative overflow-hidden">
            <div class="flex justify-between items-center mb-1">
                <span class="text-[8px] font-bold text-zinc-600 uppercase tracking-tighter">Audio_Raw_Input</span>
                <div id="status-tag" class="text-[8px] px-2 py-0.5 rounded bg-zinc-900 text-zinc-500 uppercase">Standby</div>
            </div>
            <div id="transcript-box" class="text-[11px] leading-snug text-zinc-500 italic h-full overflow-y-auto pr-2">
                Esperando señal...
            </div>
        </div>

        <!-- Panel de Puntos Resolutivos -->
        <div class="flex-1 flex flex-col gap-2 min-h-[40vh]">
            <div class="flex justify-between items-center">
                <span class="text-[10px] font-bold text-blue-400 tracking-widest uppercase italic">Decisiones / Acuerdos</span>
                <div id="ai-loader" class="hidden text-[10px] text-blue-500 animate-pulse font-bold tracking-widest">PROCESANDO_IA...</div>
            </div>
            
            <div id="resolutive-container" class="terminal-box rounded flex-1 p-4 overflow-y-auto bg-gradient-to-b from-[#0a0a0a] to-[#050505]">
                <ul id="points-list" class="space-y-3">
                    <!-- Dinámico -->
                </ul>
                <div id="empty-state" class="h-full flex items-center justify-center text-center opacity-30 px-8">
                    <p class="text-[10px] uppercase tracking-[0.3em] leading-relaxed">Sin datos resolutivos detectados aún</p>
                </div>
            </div>
        </div>

        <!-- Controles Inferiores -->
        <div class="grid grid-cols-2 gap-3 pb-6">
            <button id="start-btn" class="col-span-2 bg-blue-600 active:scale-95 text-white font-bold py-4 rounded text-xs uppercase tracking-[0.2em] transition-all flex justify-center items-center gap-2">
                <span id="btn-icon">●</span> <span id="btn-text">Iniciar Captura</span>
            </button>
            <button id="clear-btn" class="hidden bg-zinc-900 text-zinc-500 py-3 rounded text-[10px] uppercase font-bold border border-zinc-800">Limpiar</button>
            <button id="stop-btn" class="hidden bg-red-900/20 text-red-500 py-3 rounded text-[10px] uppercase font-bold border border-red-900/30">Finalizar</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // La API Key se inyecta automáticamente en el entorno CORE
        let recognition;
        let isRecording = false;
        let wakeLock = null;
        let accumulatedBuffer = "";
        let silenceTimer;

        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const clearBtn = document.getElementById('clear-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const aiLoader = document.getElementById('ai-loader');
        const emptyState = document.getElementById('empty-state');
        const statusTag = document.getElementById('status-tag');

        // Inicializar Reconocimiento de Voz
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        const text = event.results[i][0].transcript;
                        accumulatedBuffer += text + ". ";
                        
                        // Si hay un silencio de 1.5 segundos después de una frase final, procesamos.
                        clearTimeout(silenceTimer);
                        silenceTimer = setTimeout(() => {
                            if (accumulatedBuffer.trim().length > 20) {
                                sendToAI(accumulatedBuffer);
                                accumulatedBuffer = "";
                            }
                        }, 1500);

                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = `<span class="text-zinc-600">${accumulatedBuffer}</span> <span class="text-blue-500">${interim}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };

            recognition.onerror = (err) => {
                console.error("Speech Error:", err);
                statusTag.innerText = "ERROR_MIC";
                statusTag.classList.replace('bg-zinc-900', 'bg-red-900');
            };

            recognition.onend = () => {
                if (isRecording) recognition.start(); // Auto-restart si se corta
            };
        }

        async function sendToAI(text) {
            aiLoader.classList.remove('hidden');
            
            const systemPrompt = `
                Eres un ANALISTA RESOLUTIVO de alta precisión.
                Tu tarea: Escuchar una transcripción y extraer EXCLUSIVAMENTE acuerdos, decisiones tomadas, plazos o responsables asignados.
                REGLAS CRÍTICAS:
                1. Ignora saludos, introducciones, agradecimientos y explicaciones de por qué se toma la decisión.
                2. Si no hay una decisión clara en el texto, responde: "SIN_RESOLUCION".
                3. Sé extremadamente breve (máximo 15 palabras por punto).
                4. Usa un tono imperativo y directo.
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Transcripción: "${text}"` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const data = await response.json();
                const result = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim();

                if (result && !result.includes("SIN_RESOLUCION")) {
                    addResolutivePoint(result);
                }
            } catch (e) {
                console.error("AI FAIL", e);
            } finally {
                aiLoader.classList.add('hidden');
            }
        }

        function addResolutivePoint(content) {
            emptyState.classList.add('hidden');
            const li = document.createElement('li');
            li.className = "resolutive-item bg-zinc-900/80 p-3 rounded text-[12px] text-white leading-relaxed shadow-lg";
            
            // Limpieza básica de markdown que pueda devolver la IA
            const cleanContent = content.replace(/[*#]/g, '');
            
            li.innerHTML = `
                <div class="flex justify-between items-start gap-2">
                    <span>${cleanContent}</span>
                    <span class="text-[8px] text-zinc-600 font-mono">${new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                </div>
            `;
            pointsList.prepend(li); // Lo más nuevo arriba para visualización móvil
        }

        // WakeLock para evitar que el móvil se duerma
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) { console.warn("WakeLock failed"); }
        }

        startBtn.addEventListener('click', async () => {
            if (!isRecording) {
                isRecording = true;
                recognition.start();
                await requestWakeLock();
                
                startBtn.classList.replace('bg-blue-600', 'bg-zinc-800');
                startBtn.classList.add('pulse-blue');
                document.getElementById('btn-text').innerText = "ESCUCHANDO...";
                document.getElementById('btn-icon').innerText = "▣";
                
                stopBtn.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
                statusTag.innerText = "REC_ACTIVE";
                statusTag.classList.replace('bg-zinc-900', 'bg-blue-900/40');
                statusTag.classList.add('text-blue-400');
            }
        });

        stopBtn.addEventListener('click', () => {
            isRecording = false;
            recognition.stop();
            if (wakeLock) wakeLock.release();
            location.reload();
        });

        clearBtn.addEventListener('click', () => {
            pointsList.innerHTML = "";
            emptyState.classList.remove('hidden');
        });
    </script>
</body>
</html>
