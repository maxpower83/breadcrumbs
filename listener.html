<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  body{background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column}
  header{padding:16px;text-align:center;background:#1e293b;border-bottom:1px solid #334155}
  h1{font-size:1.2rem;font-weight:600}
  main{flex:1;padding:20px;max-width:700px;margin:0 auto;width:100%}
 .btn{width:100%;padding:16px;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:0.2s}
 .btn-record{background:#ef4444;color:white}
 .btn-record.recording{background:#dc2626;animation:pulse 1.5s infinite}
 .btn-process{background:#3b82f6;color:white;margin-top:12px}
 .btn:disabled{opacity:0.5;cursor:not-allowed}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.7}}
 .section{margin-top:24px;background:#1e293b;padding:16px;border-radius:12px;border:1px solid #334155}
 .section h2{font-size:0.9rem;color:#94a3b8;margin-bottom:8px;text-transform:uppercase}
 .transcript{white-space:pre-wrap;line-height:1.6;color:#cbd5e1}
 .points li{margin:8px 0 8px 20px;line-height:1.6}
 .status{font-size:0.9rem;color:#94a3b8;margin-top:8px;text-align:center}
</style>

<body>
<header><h1>🎙️ Audio Resumen</h1></header>
<main>
  <button id="recordBtn" class="btn btn-record">Empezar Grabación</button>
  <div class="status" id="status">Listo para grabar</div>

  <div class="section" id="transcriptSection" style="display:none">
    <h2>Transcripción</h2>
    <div class="transcript" id="transcript"></div>
  </div>

  <button id="summarizeBtn" class="btn btn-process" style="display:none">Resumir Puntos Clave</button>

  <div class="section" id="summarySection" style="display:none">
    <h2>Puntos Decisivos Fundamentales</h2>
    <ul class="points" id="summary"></ul>
  </div>
</main>

<script>
// Registrar Service Worker para PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('data:text/javascript,', {scope: '.'})
}

let mediaRecorder, audioChunks = [], isRecording = false
const recordBtn = document.getElementById('recordBtn')
const status = document.getElementById('status')
const transcriptDiv = document.getElementById('transcript')
const summarizeBtn = document.getElementById('summarizeBtn')
const summaryDiv = document.getElementById('summary')

recordBtn.onclick = async () => {
  if(!isRecording){
    const stream = await navigator.mediaDevices.getUserMedia({audio:true})
    mediaRecorder = new MediaRecorder(stream)
    audioChunks = []

    mediaRecorder.ondataavailable = e => audioChunks.push(e.data)
    mediaRecorder.onstop = transcribeAudio

    mediaRecorder.start()
    isRecording = true
    recordBtn.textContent = 'Detener Grabación'
    recordBtn.classList.add('recording')
    status.textContent = 'Grabando... habla ahora'
  } else {
    mediaRecorder.stop()
    mediaRecorder.stream.getTracks().forEach(track => track.stop())
    isRecording = false
    recordBtn.textContent = 'Empezar Grabación'
    recordBtn.classList.remove('recording')
    status.textContent = 'Procesando audio...'
  }
}

function transcribeAudio(){
  // Usa Web Speech API nativa del navegador. Funciona offline en Chrome Android.
  const audioBlob = new Blob(audioChunks)
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)()
  recognition.lang = 'es-ES'
  recognition.continuous = true
  recognition.interimResults = false

  recognition.onresult = e => {
    let text = ''
    for(let i=0; i<e.results.length; i++){
      text += e.results[i][0].transcript + ' '
    }
    transcriptDiv.textContent = text.trim()
    document.getElementById('transcriptSection').style.display = 'block'
    summarizeBtn.style.display = 'block'
    status.textContent = 'Transcripción lista'
  }

  recognition.onerror = () => {
    status.textContent = 'Error en transcripción. Usá Chrome en Android para mejor resultado.'
  }

  // Truco: convertir blob a audio y reproducir para que SpeechRecognition lo escuche
  const audio = new Audio(URL.createObjectURL(audioBlob))
  audio.play()
  recognition.start()
}

summarizeBtn.onclick = () => {
  const text = transcriptDiv.textContent
  if(!text) return

  status.textContent = 'Resumiendo...'

  // Resumen heurístico local: extrae frases con palabras clave y oraciones cortas
  const sentences = text.split(/[.!?]/).map(s => s.trim()).filter(s => s.length > 20)

  // Palabras que indican puntos importantes
  const keywords = ['importante','clave','decisivo','conclusión','por lo tanto','resultado','problema','solución','debe','hay que','recomendación']

  let keyPoints = sentences.filter(s =>
    keywords.some(k => s.toLowerCase().includes(k)) || s.length < 120
  )

  // Si no hay suficientes, toma las primeras y últimas 3
  if(keyPoints.length < 3){
    keyPoints = [...sentences.slice(0,3),...sentences.slice(-3)]
  }

  // Deduplicar y limitar a 7 puntos
  keyPoints = [...new Set(keyPoints)].slice(0,7)

  summaryDiv.innerHTML = keyPoints.map(p => `<li>${p}</li>`).join('')
  document.getElementById('summarySection').style.display = 'block'
  status.textContent = 'Listo'
}
