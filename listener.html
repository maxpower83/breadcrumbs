<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LISTENER - Extracción Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
            touch-action: manipulation;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
        }
        .dot-flashing {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
        }
        @keyframes dot-flashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col">
    <div class="max-w-2xl mx-auto w-full flex flex-col h-[95vh]">
        
        <header class="mb-4 border-l-4 border-blue-600 pl-4 shrink-0">
            <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">LISTENER</h1>
            <p class="text-zinc-500 text-[9px] tracking-[0.2em] uppercase font-bold">Modo: Procesamiento Post-Sesión</p>
        </header>

        <div class="flex-1 flex flex-col gap-4 overflow-hidden">
            <!-- Transcripción en vivo -->
            <div class="terminal-box rounded p-3 h-1/2 flex flex-col">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-bold text-zinc-500 uppercase">Captura_Cruda</span>
                    <div id="status-indicator" class="hidden flex items-center gap-2">
                        <span class="text-[9px] text-red-500 font-bold animate-pulse">GRABANDO</span>
                        <div class="h-2 w-2 bg-red-600 rounded-full animate-pulse"></div>
                    </div>
                </div>
                <div id="transcript-box" class="flex-1 overflow-y-auto text-[12px] leading-relaxed text-zinc-400 font-mono italic">
                    Esperando inicio de captura...
                </div>
            </div>

            <!-- Resultado IA -->
            <div class="terminal-box rounded p-3 h-1/2 border-blue-900/30 flex flex-col relative">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-[9px] font-bold text-blue-400 uppercase">Puntos_Resolutivos_Finales</span>
                    <div id="ai-loading" class="hidden"><div class="dot-flashing"></div></div>
                </div>
                <div id="resolutive-box" class="flex-1 overflow-y-auto">
                    <ul id="points-list" class="space-y-3"></ul>
                    <div id="placeholder-text" class="text-[10px] text-zinc-800 text-center mt-20 uppercase tracking-[0.3em]">
                        El resumen aparecerá al finalizar la sesión.
                    </div>
                </div>
            </div>
        </div>

        <!-- Botonera -->
        <div class="mt-4 grid grid-cols-1 gap-3 shrink-0">
            <button id="start-btn" class="bg-blue-600 active:bg-blue-800 text-white font-bold py-5 rounded text-xs uppercase tracking-widest transition-all">
                Iniciar Captura de Audio
            </button>
            
            <button id="finish-btn" class="hidden bg-white text-black font-bold py-5 rounded text-xs uppercase tracking-widest shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                Finalizar y Procesar Resumen
            </button>

            <button id="reset-btn" class="hidden bg-zinc-900 text-zinc-500 font-bold py-3 rounded text-[10px] uppercase tracking-widest border border-zinc-800">
                Reiniciar Sistema
            </button>
        </div>

        <footer class="mt-4 shrink-0 text-center">
            <p class="text-[8px] text-zinc-700 uppercase tracking-widest">
                Protocolo: Extracción de acuerdos, decisiones y plazos omitiendo fundamentos.
            </p>
        </footer>
    </div>

    <script>
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        let recognition;
        let fullTranscript = "";
        
        const startBtn = document.getElementById('start-btn');
        const finishBtn = document.getElementById('finish-btn');
        const resetBtn = document.getElementById('reset-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const statusIndicator = document.getElementById('status-indicator');
        const placeholderText = document.getElementById('placeholder-text');
        const aiLoading = document.getElementById('ai-loading');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        fullTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = `<span class="text-zinc-300">${fullTranscript}</span><span class="text-blue-500">${interim}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };
        }

        async function fetchWithRetry(url, options, retries = 5, backoff = 1000) {
            try {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                return await response.json();
            } catch (err) {
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
                throw err;
            }
        }

        async function processFinalSummary() {
            if (fullTranscript.trim().length < 10) return;

            aiLoading.classList.remove('hidden');
            placeholderText.classList.add('hidden');
            pointsList.innerHTML = "";

            const systemPrompt = `ACTÚA COMO UN SECRETARIO DE ACTAS DE ALTA PRECISIÓN. 
            Tu tarea es analizar el discurso completo y extraer exclusivamente los PUNTOS RESOLUTIVOS.
            
            REGLAS CRÍTICAS:
            1. OMITE: Saludos, agradecimientos, fundamentos técnicos, explicaciones de motivos y contexto histórico.
            2. EXTRAE: Acuerdos finales, decisiones tomadas, plazos establecidos y responsables asignados.
            3. FORMATO: Lista de puntos directos, breves y ejecutivos.
            4. IDIOMA: Responde siempre en Español.
            5. Si no hay decisiones claras, indica "NO SE DETECTARON ACUERDOS RESOLUTIVOS".`;

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;
                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Extrae la parte resolutiva de este discurso: ${fullTranscript}` }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                const aiResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;

                if (aiResponse) {
                    const lines = aiResponse.split('\n').filter(l => l.trim().length > 3);
                    lines.forEach(line => {
                        const li = document.createElement('li');
                        li.className = "bg-zinc-900/80 p-4 rounded border-l-4 border-blue-500 text-[12px] text-white font-bold uppercase leading-tight tracking-tight";
                        li.innerText = line.replace(/^[•\-\*#\d\.]+\s*/, '').trim();
                        pointsList.appendChild(li);
                    });
                }
            } catch (e) {
                const errLi = document.createElement('li');
                errLi.className = "text-red-500 text-[10px] font-bold";
                errLi.innerText = "ERROR_DE_COMUNICACIÓN: Reintente el procesamiento.";
                pointsList.appendChild(errLi);
            } finally {
                aiLoading.classList.add('hidden');
            }
        }

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.classList.add('hidden');
            finishBtn.classList.remove('hidden');
            statusIndicator.classList.remove('hidden');
            transcriptBox.innerText = "";
        });

        finishBtn.addEventListener('click', () => {
            recognition.stop();
            statusIndicator.classList.add('hidden');
            finishBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            processFinalSummary();
        });

        resetBtn.addEventListener('click', () => {
            fullTranscript = "";
            transcriptBox.innerText = "Esperando inicio de captura...";
            pointsList.innerHTML = "";
            placeholderText.classList.remove('hidden');
            resetBtn.classList.add('hidden');
            startBtn.classList.remove('hidden');
        });
    </script>
</body>
</html>
