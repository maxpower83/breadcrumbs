
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LISTENER V5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body {
            font-family: 'JetBrains+Mono', monospace;
            background-color: #050505;
            color: #a1a1aa;
        }
        .terminal-box {
            background: #0a0a0a;
            border: 1px solid #27272a;
        }
        .dot-flashing {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #3b82f6;
            animation: dot-flashing 1s infinite linear alternate;
        }
        @keyframes dot-flashing {
            0% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen p-4 flex flex-col">
    <div class="max-w-2xl mx-auto w-full flex flex-col h-[95vh]">
        
        <header class="mb-4 border-l-4 border-blue-600 pl-4 shrink-0">
            <h1 class="text-xl font-bold text-white tracking-tighter uppercase italic">LISTENER V5</h1>
            <p class="text-zinc-500 text-[9px] tracking-[0.2em] uppercase font-bold text-blue-400">Extracción Resolutiva Directa</p>
        </header>

        <div class="flex-1 flex flex-col gap-4 overflow-hidden">
            <!-- Audio Input -->
            <div class="terminal-box rounded p-3 h-1/2 flex flex-col border-zinc-800">
                <div class="flex justify-between items-center mb-2 text-[9px] font-bold text-zinc-500 uppercase">
                    <span>Captura_Voz</span>
                    <div id="status-label" class="hidden text-red-600 animate-pulse font-bold">● REC</div>
                </div>
                <div id="transcript-box" class="flex-1 overflow-y-auto text-[13px] leading-snug text-zinc-400 font-mono italic">
                    Sistema listo para grabar.
                </div>
            </div>

            <!-- AI Output -->
            <div class="terminal-box rounded p-3 h-1/2 border-blue-900/30 flex flex-col">
                <div class="flex justify-between items-center mb-2 text-[9px] font-bold text-blue-400 uppercase">
                    <span>Puntos_Resolutivos</span>
                    <div id="ai-loading" class="hidden"><div class="dot-flashing"></div></div>
                </div>
                <div id="resolutive-box" class="flex-1 overflow-y-auto">
                    <ul id="points-list" class="space-y-3"></ul>
                </div>
            </div>
        </div>

        <!-- Controles -->
        <div class="mt-4 grid grid-cols-1 gap-2 shrink-0">
            <button id="start-btn" class="bg-blue-600 text-white font-bold py-5 rounded text-xs uppercase tracking-widest shadow-lg shadow-blue-900/20">
                Iniciar Grabación
            </button>
            <button id="finish-btn" class="hidden bg-white text-black font-bold py-5 rounded text-xs uppercase tracking-widest">
                Finalizar y Extraer Resolutivo
            </button>
            <button id="reset-btn" class="hidden bg-zinc-900 text-zinc-500 font-bold py-3 rounded text-[10px] uppercase tracking-widest border border-zinc-800">
                Reiniciar
            </button>
        </div>
    </div>

    <script>
        // En este entorno, la apiKey se inyecta automáticamente si la dejamos así
        const apiKey = ""; 
        const modelName = "gemini-2.5-flash-preview-09-2025";
        
        let recognition;
        let finalTranscript = "";
        let isRecording = false;

        const startBtn = document.getElementById('start-btn');
        const finishBtn = document.getElementById('finish-btn');
        const resetBtn = document.getElementById('reset-btn');
        const transcriptBox = document.getElementById('transcript-box');
        const pointsList = document.getElementById('points-list');
        const statusLabel = document.getElementById('status-label');
        const aiLoading = document.getElementById('ai-loading');

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'es-ES';

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }
                transcriptBox.innerHTML = `<span class="text-zinc-200">${finalTranscript}</span><span class="text-blue-600">${interimTranscript}</span>`;
                transcriptBox.scrollTop = transcriptBox.scrollHeight;
            };

            recognition.onend = () => { if (isRecording) recognition.start(); };
        }

        async function processSummary() {
            const textToProcess = finalTranscript.trim();
            if (!textToProcess) return;

            aiLoading.classList.remove('hidden');
            pointsList.innerHTML = "";

            const payload = {
                contents: [{ parts: [{ text: `Analiza el siguiente discurso y extrae exclusivamente los PUNTOS RESOLUTIVOS, DECISIONES, ACUERDOS, FECHAS Y RESPONSABLES. Ignora fundamentos, retórica y contexto previo. Sé directo y breve: ${textToProcess}` }] }],
                systemInstruction: { parts: [{ text: "Eres un relator ejecutivo. Tu única función es extraer lo resolutivo de un discurso. No resumas, extrae decisiones concretas en forma de lista." }] }
            };

            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

            let retries = 5;
            let delay = 1000;

            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || "Error desconocido");
                    }

                    const data = await response.json();
                    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (aiText) {
                        const lines = aiText.split('\n').filter(l => l.trim().length > 3);
                        pointsList.innerHTML = lines.map(line => `
                            <li class="bg-zinc-900/80 p-4 rounded border-l-4 border-blue-500 text-[12px] text-white font-bold uppercase tracking-tight shadow-md">
                                ${line.replace(/^[•\-\*#\d\.]+\s*/, '').trim()}
                            </li>
                        `).join('');
                    }
                    break;
                } catch (e) {
                    retries--;
                    if (retries === 0) {
                        pointsList.innerHTML = `<li class="text-red-500 text-[10px] p-2 bg-red-900/10 border border-red-900">ERROR: ${e.message}</li>`;
                    } else {
                        await new Promise(r => setTimeout(r, delay));
                        delay *= 2;
                    }
                } finally {
                    aiLoading.classList.add('hidden');
                }
            }
        }

        startBtn.addEventListener('click', () => {
            isRecording = true;
            finalTranscript = "";
            transcriptBox.innerText = "CAPTURA_ACTIVA...";
            recognition.start();
            startBtn.classList.add('hidden');
            finishBtn.classList.remove('hidden');
            statusLabel.classList.remove('hidden');
        });

        finishBtn.addEventListener('click', () => {
            isRecording = false;
            recognition.stop();
            finishBtn.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            statusLabel.classList.add('hidden');
            processSummary();
        });

        resetBtn.addEventListener('click', () => { location.reload(); });
    </script>
</body>
</html>
