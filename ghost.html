<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost QR | CORE SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías para QR y Scanner -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #0a0a0a; color: #d1d1d1; }
        .container-card { background-color: #161616; border: 1px solid #222; transition: all 0.2s; }
        .container-card:hover { border-color: #3b82f6; background-color: #1a1a1a; }
        input, textarea { background-color: #121212 !important; border: 1px solid #333 !important; color: #fff !important; }
        .qr-canvas-wrapper canvas { margin: 0 auto; border: 8px solid white; border-radius: 4px; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white; color: black; }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-2xl mx-auto no-print">
        <header class="mb-8 border-b border-zinc-800 pb-4 flex justify-between items-center">
            <div>
                <a href="index.html" class="text-[10px] text-zinc-600 hover:text-blue-500 uppercase">← Hub</a>
                <h1 class="text-xl font-bold text-white uppercase tracking-tighter">Ghost QR <span class="text-blue-500">v2.0</span></h1>
            </div>
            <div class="flex gap-2">
                <button onclick="startScanner()" class="bg-zinc-800 hover:bg-blue-600 p-2 rounded text-white transition-colors" title="Escanear QR">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16V21H16"/><path d="M21 9V10"/><path d="M9 21H10"/><path d="M14 16V15"/><path d="M15 16H16"/><path d="M15 21V20"/><path d="M17 18H18"/><path d="M20 18H21"/><path d="M18 21H17"/><path d="M12 11h.01"/></svg>
                </button>
            </div>
        </header>

        <!-- BUSCADOR -->
        <div class="mb-6 space-y-3">
            <input type="text" id="searchInput" placeholder="BUSCAR CONTENIDO O ID..." class="w-full p-4 rounded bg-zinc-900 border border-zinc-800 text-sm">
            <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors uppercase text-xs">Crear Nuevo Registro</button>
        </div>

        <!-- LISTA -->
        <div id="inventoryList" class="grid grid-cols-1 gap-3"></div>
    </div>

    <!-- SCANNER OVERLAY -->
    <div id="scannerModal" class="fixed inset-0 bg-black z-50 hidden flex-col">
        <div class="p-4 flex justify-between items-center border-b border-zinc-800">
            <span class="text-xs font-bold uppercase">Scanner Activo</span>
            <button onclick="stopScanner()" class="text-red-500 font-bold">CERRAR</button>
        </div>
        <div id="reader" class="flex-1"></div>
        <div class="p-8 text-center text-[10px] text-zinc-500 uppercase">Apunta a una etiqueta Ghost QR</div>
    </div>

    <!-- FORM MODAL -->
    <div id="modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center p-4 z-40 backdrop-blur-md">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-lg w-full max-w-md shadow-2xl">
            <h2 id="modalTitle" class="text-lg font-bold mb-6 text-white uppercase tracking-widest border-b border-zinc-800 pb-2">Indexar</h2>
            <input type="hidden" id="editIndex">
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase mb-1 block">Identificador</label>
                    <input type="text" id="boxId" placeholder="BOX-001" class="w-full p-3 rounded text-sm uppercase">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase mb-1 block">Ubicación física</label>
                    <input type="text" id="boxLoc" placeholder="ESTANTE A / DEPÓSITO" class="w-full p-3 rounded text-sm uppercase">
                </div>
                <div>
                    <label class="text-[10px] text-zinc-500 uppercase mb-1 block">Contenido</label>
                    <textarea id="boxContent" rows="4" placeholder="Lista de objetos..." class="w-full p-3 rounded text-sm"></textarea>
                </div>
                <div class="flex gap-2 pt-4">
                    <button onclick="saveBox()" class="flex-1 bg-blue-600 text-white font-bold py-3 rounded uppercase text-[10px]">Guardar Datos</button>
                    <button onclick="closeModal()" class="flex-1 bg-zinc-800 text-zinc-400 py-3 rounded uppercase text-[10px]">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- QR PREVIEW MODAL -->
    <div id="qrModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center p-4 z-50">
        <div class="text-center w-full max-w-sm">
            <div id="qrcode" class="qr-canvas-wrapper mb-6 bg-white p-4 inline-block"></div>
            <div id="qrInfo" class="text-white mb-8">
                <h3 id="qrName" class="text-2xl font-bold uppercase"></h3>
                <p id="qrDesc" class="text-zinc-500 text-xs mt-1"></p>
            </div>
            <div class="flex flex-col gap-3 no-print">
                <button onclick="window.print()" class="w-full bg-white text-black font-bold py-3 rounded uppercase text-xs">Imprimir Etiqueta</button>
                <button onclick="closeQrModal()" class="w-full border border-zinc-800 text-zinc-500 py-3 rounded uppercase text-xs">Cerrar</button>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ghost_inventory')) || [];
        let html5QrCode = null;

        // Renderizado principal
        function render(filter = '') {
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';
            
            const filtered = inventory.filter(i => 
                i.content.toLowerCase().includes(filter.toLowerCase()) || 
                i.id.toUpperCase().includes(filter.toUpperCase()) ||
                i.loc.toUpperCase().includes(filter.toUpperCase())
            );

            if(filtered.length === 0) {
                list.innerHTML = `<div class="p-8 text-center text-zinc-700 uppercase text-[10px]">Sin resultados</div>`;
                return;
            }

            filtered.forEach((item, index) => {
                const realIdx = inventory.findIndex(x => x.id === item.id);
                const card = document.createElement('div');
                card.className = 'container-card p-4 rounded-lg flex justify-between items-center';
                card.innerHTML = `
                    <div class="flex-1 pr-4">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-[10px] text-blue-400 font-bold tracking-tighter bg-blue-900/20 px-2 py-0.5 rounded border border-blue-800/30">${item.id}</span>
                            <span class="text-[9px] text-zinc-600 uppercase font-bold">${item.loc}</span>
                        </div>
                        <p class="text-xs text-zinc-400 line-clamp-2 leading-relaxed">${item.content}</p>
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="showQR(${realIdx})" class="text-zinc-500 hover:text-white transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16V21H16"/><path d="M21 9V10"/><path d="M9 21H10"/><path d="M14 16V15"/><path d="M15 16H16"/><path d="M15 21V20"/><path d="M17 18H18"/><path d="M20 18H21"/><path d="M18 21H17"/><path d="M12 11h.01"/></svg>
                        </button>
                        <button onclick="openModal(${realIdx})" class="text-zinc-500 hover:text-blue-400 text-[10px] font-bold">EDIT</button>
                        <button onclick="deleteBox(${realIdx})" class="text-zinc-700 hover:text-red-500 text-lg">&times;</button>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Modales
        function openModal(index = -1) {
            const modal = document.getElementById('modal');
            const editIdx = document.getElementById('editIndex');
            
            if (index > -1) {
                const item = inventory[index];
                document.getElementById('modalTitle').innerText = "Editar " + item.id;
                editIdx.value = index;
                document.getElementById('boxId').value = item.id;
                document.getElementById('boxLoc').value = item.loc;
                document.getElementById('boxContent').value = item.content;
            } else {
                document.getElementById('modalTitle').innerText = "Nuevo Contenedor";
                editIdx.value = -1;
                document.getElementById('boxId').value = 'BOX-' + Math.floor(Math.random()*9000 + 1000);
                document.getElementById('boxLoc').value = '';
                document.getElementById('boxContent').value = '';
            }
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden'); 
            document.getElementById('modal').classList.remove('flex'); 
        }

        function saveBox() {
            const index = parseInt(document.getElementById('editIndex').value);
            const data = {
                id: document.getElementById('boxId').value.toUpperCase().trim(),
                loc: document.getElementById('boxLoc').value.toUpperCase().trim(),
                content: document.getElementById('boxContent').value.trim(),
                timestamp: Date.now()
            };

            if(!data.id) return;

            if (index > -1) inventory[index] = data;
            else inventory.push(data);

            localStorage.setItem('ghost_inventory', JSON.stringify(inventory));
            closeModal();
            render();
        }

        function deleteBox(index) {
            if(confirm('¿ELIMINAR REGISTRO FÍSICO?')) {
                inventory.splice(index, 1);
                localStorage.setItem('ghost_inventory', JSON.stringify(inventory));
                render();
            }
        }

        // Lógica de QR e Impresión
        function showQR(index) {
            const item = inventory[index];
            document.getElementById('qrModal').classList.remove('hidden');
            document.getElementById('qrModal').classList.add('flex');
            document.getElementById('qrName').innerText = item.id;
            document.getElementById('qrDesc').innerText = item.loc;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, {
                text: "GHOST_INV:" + item.id,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
        }

        function closeQrModal() {
            document.getElementById('qrModal').classList.add('hidden');
            document.getElementById('qrModal').classList.remove('flex');
        }

        // Scanner
        function startScanner() {
            document.getElementById('scannerModal').classList.remove('hidden');
            document.getElementById('scannerModal').classList.add('flex');
            
            html5QrCode = new Html5Qrcode("reader");
            const qrCodeSuccessCallback = (decodedText, decodedResult) => {
                if(decodedText.startsWith("GHOST_INV:")) {
                    const id = decodedText.split(":")[1];
                    stopScanner();
                    document.getElementById('searchInput').value = id;
                    render(id);
                }
            };
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };
            html5QrCode.start({ facingMode: "environment" }, config, qrCodeSuccessCallback);
        }

        function stopScanner() {
            if(html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scannerModal').classList.add('hidden');
                    document.getElementById('scannerModal').classList.remove('flex');
                });
            } else {
                document.getElementById('scannerModal').classList.add('hidden');
            }
        }

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));
        window.onload = () => render();
    </script>
</body>
</html>
