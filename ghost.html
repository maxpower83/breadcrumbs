<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Inventory | CORE</title>
    <link rel="manifest" id="pwa-manifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #0a0a0a; color: #d1d1d1; }
        .container-card { background-color: #1a1a1a; border-left: 4px solid #3b82f6; }
        input, textarea { background-color: #121212 !important; border: 1px solid #333 !important; color: #fff !important; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-3xl mx-auto">
        <header class="mb-8 border-b border-zinc-800 pb-4 flex justify-between items-end">
            <div>
                <a href="index.html" class="text-[10px] text-zinc-600 hover:text-blue-500 uppercase">← Hub</a>
                <h1 class="text-2xl font-bold text-white uppercase tracking-tighter">Ghost Inventory</h1>
            </div>
            <button id="installBtn" class="hidden bg-white text-black px-3 py-1 rounded text-[10px] font-bold uppercase">Instalar App</button>
        </header>

        <div class="mb-8 sticky top-0 bg-black/90 py-4 z-10 backdrop-blur-sm">
            <input type="text" id="searchInput" placeholder="BUSCAR..." class="w-full p-4 rounded bg-zinc-900 border border-zinc-800 text-lg mb-4">
            <button onclick="openModal()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors uppercase text-sm">+ Indexar Contenedor</button>
        </div>

        <div id="inventoryList" class="space-y-4"></div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center p-4 z-20">
        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-lg w-full max-w-md">
            <h2 id="modalTitle" class="text-xl font-bold mb-4 text-white uppercase font-mono">Nuevo Contenedor</h2>
            <input type="hidden" id="editIndex">
            <div class="space-y-4">
                <input type="text" id="boxId" placeholder="ID (EJ: CAJA-01)" class="w-full p-2 rounded">
                <input type="text" id="boxLoc" placeholder="UBICACIÓN" class="w-full p-2 rounded">
                <textarea id="boxContent" rows="4" placeholder="CONTENIDO..." class="w-full p-2 rounded"></textarea>
                <div class="flex gap-2 pt-4">
                    <button onclick="saveBox()" class="flex-1 bg-green-700 text-white font-bold py-2 rounded uppercase text-xs">Guardar</button>
                    <button onclick="closeModal()" class="flex-1 bg-zinc-800 text-zinc-400 py-2 rounded uppercase text-xs">Cerrar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let inventory = JSON.parse(localStorage.getItem('ghost_inventory')) || [];

        function openModal(index = -1) {
            const modal = document.getElementById('modal');
            const title = document.getElementById('modalTitle');
            const editIdx = document.getElementById('editIndex');
            
            if (index > -1) {
                const item = inventory[index];
                title.innerText = "Editar Contenedor";
                editIdx.value = index;
                document.getElementById('boxId').value = item.id;
                document.getElementById('boxLoc').value = item.loc;
                document.getElementById('boxContent').value = item.content;
            } else {
                title.innerText = "Nuevo Contenedor";
                editIdx.value = -1;
                document.getElementById('boxId').value = '';
                document.getElementById('boxLoc').value = '';
                document.getElementById('boxContent').value = '';
            }
            modal.style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function saveBox() {
            const index = parseInt(document.getElementById('editIndex').value);
            const data = {
                id: document.getElementById('boxId').value.toUpperCase(),
                loc: document.getElementById('boxLoc').value.toUpperCase(),
                content: document.getElementById('boxContent').value.toLowerCase(),
                timestamp: index > -1 ? inventory[index].timestamp : Date.now()
            };

            if (index > -1) inventory[index] = data;
            else inventory.push(data);

            localStorage.setItem('ghost_inventory', JSON.stringify(inventory));
            closeModal();
            render();
        }

        function deleteBox(index) {
            if(confirm('¿Eliminar registro?')) {
                inventory.splice(index, 1);
                localStorage.setItem('ghost_inventory', JSON.stringify(inventory));
                render();
            }
        }

        function render(filter = '') {
            const list = document.getElementById('inventoryList');
            list.innerHTML = '';
            inventory.filter(i => i.content.includes(filter.toLowerCase()) || i.id.includes(filter.toUpperCase()))
                .forEach((item, realIdx) => {
                    const card = document.createElement('div');
                    card.className = 'container-card p-4 rounded flex justify-between items-start';
                    card.innerHTML = `
                        <div class="flex-1">
                            <span class="text-[10px] text-blue-400 font-bold border border-blue-900 px-2 py-0.5 rounded">${item.id}</span>
                            <p class="mt-2 text-sm text-zinc-300">${item.content}</p>
                            <p class="text-[9px] text-zinc-600 mt-2 uppercase tracking-widest">${item.loc || 'N/A'}</p>
                        </div>
                        <div class="flex flex-col gap-2">
                            <button onclick="openModal(${realIdx})" class="text-zinc-600 hover:text-white text-xs font-bold uppercase tracking-tighter">Edit</button>
                            <button onclick="deleteBox(${realIdx})" class="text-zinc-800 hover:text-red-500 text-xl">&times;</button>
                        </div>
                    `;
                    list.appendChild(card);
                });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => render(e.target.value));
        window.onload = render;

        // PWA Logic
        const manifest = {
            "name": "Ghost Inventory",
            "short_name": "GhostInv",
            "start_url": "ghost.html",
            "display": "standalone",
            "background_color": "#0a0a0a",
            "theme_color": "#3b82f6"
        };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;base64,' + btoa(JSON.stringify(manifest)));
    </script>
</body>
</html>
