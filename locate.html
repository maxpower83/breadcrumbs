<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locator PWA</title>
    <!-- Link al manifiesto -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/854/854878.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans">
    <div id="root">
        <!-- El componente React anterior se montaría aquí -->
        <div class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
            <h1 class="text-xl font-bold mb-2">Locator PWA</h1>
            <p class="text-gray-400 text-sm mb-4">Cargando aplicación...</p>
            <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-blue-500"></div>
        </div>
    </div>

    <script>
        // Registro del Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.error('Error SW', err));
            });
        }
    </script>
</body>
</html>
