<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-LOCATOR: Sistema de Seguimiento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"></script>
    <style>
        .compass-arrow {
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .pulse {
            animation: pulse-animation 2s infinite;
        }
        @keyframes pulse-animation {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex flex-col font-mono">

    <header class="p-4 border-b border-zinc-800 flex justify-between items-center bg-zinc-900">
        <h1 class="text-lg font-bold tracking-tighter text-red-500">CORE-LOCATOR v1.0</h1>
        <div id="status-badge" class="px-2 py-1 rounded text-xs bg-zinc-800 text-zinc-400">OFFLINE</div>
    </header>

    <main class="flex-grow p-4 space-y-6 max-w-md mx-auto w-full">
        
        <!-- Sección de Selección de Rol -->
        <div id="setup-ui" class="space-y-4">
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800">
                <h2 class="text-xl mb-4 border-b border-zinc-800 pb-2">Configuración de Enlace</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase text-zinc-500 mb-1 font-bold">ID de Sesión</label>
                        <input id="session-id" type="text" placeholder="Ej: Operacion-X" class="w-full bg-zinc-800 border border-zinc-700 p-3 rounded focus:outline-none focus:border-red-500 transition-colors uppercase">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="initRole('A')" class="bg-red-600 hover:bg-red-700 p-4 rounded font-bold transition-all active:scale-95 text-sm uppercase">Soy Usuario A (Objetivo)</button>
                        <button onclick="initRole('B')" class="bg-zinc-100 hover:bg-white text-zinc-950 p-4 rounded font-bold transition-all active:scale-95 text-sm uppercase">Soy Usuario B (Buscador)</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Interfaz del Usuario A (Objetivo) -->
        <div id="role-a-ui" class="hidden space-y-4">
            <div class="bg-zinc-900 p-6 rounded-lg border border-red-900/30 text-center">
                <div class="w-16 h-16 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-4 pulse">
                    <div class="w-4 h-4 bg-red-600 rounded-full"></div>
                </div>
                <h2 class="text-xl font-bold mb-2">Transmitiendo Ubicación</h2>
                <p class="text-zinc-400 text-sm mb-4">El Usuario B puede ver tu posición en tiempo real.</p>
                <div class="text-xs bg-zinc-950 p-3 rounded border border-zinc-800 mb-4">
                    <span class="text-zinc-500">SESIÓN:</span> <span id="display-id-a" class="text-zinc-100"></span>
                </div>
                <button onclick="location.reload()" class="text-xs text-zinc-500 hover:text-red-400">DETENER TRANSMISIÓN</button>
            </div>
        </div>

        <!-- Interfaz del Usuario B (Buscador) -->
        <div id="role-b-ui" class="hidden space-y-4">
            <div class="bg-zinc-900 p-6 rounded-lg border border-zinc-800 flex flex-col items-center">
                <div class="relative w-48 h-48 rounded-full border-2 border-zinc-800 mb-6 flex items-center justify-center">
                    <div id="compass" class="compass-arrow absolute w-full h-full flex items-center justify-center">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
                    </div>
                    <div class="text-xs text-zinc-500 absolute top-2 uppercase">Norte</div>
                    <div class="text-xs text-zinc-500 absolute bottom-2 uppercase">Sur</div>
                </div>

                <div class="w-full grid grid-cols-2 gap-4 mb-4">
                    <div class="bg-zinc-950 p-4 rounded border border-zinc-800 text-center">
                        <div class="text-[10px] text-zinc-500 uppercase tracking-widest">Distancia</div>
                        <div id="distance" class="text-2xl font-bold text-red-500">---</div>
                    </div>
                    <div class="bg-zinc-950 p-4 rounded border border-zinc-800 text-center">
                        <div class="text-[10px] text-zinc-500 uppercase tracking-widest">Rumbo</div>
                        <div id="bearing" class="text-2xl font-bold text-zinc-100">---</div>
                    </div>
                </div>
                <div id="last-update" class="text-[10px] text-zinc-600 uppercase">Esperando señal...</div>
            </div>
        </div>

    </main>

    <div id="modal-error" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-zinc-900 border border-red-600 p-6 rounded max-w-sm w-full text-center">
            <h3 class="text-red-500 font-bold mb-2 uppercase">Error de Sistema</h3>
            <p id="error-text" class="text-sm text-zinc-300 mb-4"></p>
            <button onclick="document.getElementById('modal-error').classList.add('hidden')" class="bg-zinc-800 px-4 py-2 rounded text-xs">CERRAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN E INICIALIZACIÓN
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'core-locator';

        let currentUser = null;
        let sessionRef = null;
        let watchId = null;

        // AUTHENTICATION
        const initAuth = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                showError("No se pudo establecer conexión segura.");
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('status-badge').innerText = "CONECTADO";
                document.getElementById('status-badge').classList.replace('text-zinc-400', 'text-green-500');
            }
        });

        initAuth();

        window.initRole = async (role) => {
            const sid = document.getElementById('session-id').value.trim().toUpperCase();
            if (!sid) return showError("ID de sesión requerido.");
            if (!currentUser) return showError("Esperando autenticación...");

            document.getElementById('setup-ui').classList.add('hidden');
            
            if (role === 'A') {
                document.getElementById('role-a-ui').classList.remove('hidden');
                document.getElementById('display-id-a').innerText = sid;
                startTracking(sid, 'A');
            } else {
                document.getElementById('role-b-ui').classList.remove('hidden');
                startTracking(sid, 'B');
            }
        };

        function startTracking(sid, role) {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', sid);

            if (role === 'A') {
                // El usuario A actualiza su posición constantemente
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const data = {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        timestamp: Date.now()
                    };
                    setDoc(docRef, data, { merge: true });
                }, (err) => showError("Activa el GPS para transmitir."), { enableHighAccuracy: true });
            } else {
                // El usuario B escucha la posición de A y calcula su propia distancia/rumbo
                onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const targetPos = docSnap.data();
                        navigator.geolocation.getCurrentPosition((myPos) => {
                            updateUIForB(myPos.coords, targetPos);
                        }, null, { enableHighAccuracy: true });
                    }
                }, (err) => showError("Error al recibir señal del Objetivo."));
            }
        }

        function updateUIForB(myCoords, targetPos) {
            const dist = calculateDistance(myCoords.latitude, myCoords.longitude, targetPos.lat, targetPos.lng);
            const bearing = calculateBearing(myCoords.latitude, myCoords.longitude, targetPos.lat, targetPos.lng);
            
            document.getElementById('distance').innerText = dist > 1000 ? (dist/1000).toFixed(2) + " km" : Math.round(dist) + " m";
            document.getElementById('bearing').innerText = Math.round(bearing) + "°";
            document.getElementById('compass').style.transform = `rotate(${bearing}deg)`;
            document.getElementById('last-update').innerText = "Recibido: " + new Date(targetPos.timestamp).toLocaleTimeString();
        }

        // CÁLCULOS MATEMÁTICOS (Protocolo MASTER)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radio de la Tierra en metros
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c; 
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1) * Math.PI/180) * Math.cos(lat2 * Math.PI/180);
            const x = Math.cos(lat1 * Math.PI/180) * Math.sin(lat2 * Math.PI/180) -
                      Math.sin(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.cos((lon2-lon1) * Math.PI/180);
            const brng = Math.atan2(y, x) * 180/Math.PI;
            return (brng + 360) % 360;
        }

        function showError(msg) {
            document.getElementById('error-text').innerText = msg;
            document.getElementById('modal-error').classList.remove('hidden');
        }

    </script>
</body>
</html>
