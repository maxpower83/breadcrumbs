<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Beacon Link</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .compass-arrow {
            transition: transform 0.1s linear;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading-pulse { animation: pulse 1.5s infinite; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans selection:bg-blue-500">
    <div id="app" class="h-screen w-full flex flex-col p-6 max-w-md mx-auto">
        
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-white">BEACON<span class="text-blue-500">.</span></h1>
            <p class="text-zinc-500 text-xs mt-1 uppercase tracking-widest">Localización Relativa P2P</p>
        </header>

        <main class="flex-1 flex flex-col">
            
            <!-- Vista Inicial -->
            <div id="view-home" class="space-y-4">
                <button onclick="startA()" class="w-full bg-white text-black h-20 rounded-2xl font-bold text-lg active:scale-95 transition-transform">
                    GENERAR MI UBICACIÓN
                </button>
                <p class="text-center text-zinc-600 text-sm italic">Crea un enlace para que otros te encuentren</p>
            </div>

            <!-- Vista Generando (Usuario A) -->
            <div id="view-creating" class="hidden space-y-6 text-center">
                <div class="py-10">
                    <div class="loading-pulse text-blue-500 text-xl font-mono" id="gps-status">OBTENIENDO GPS...</div>
                </div>
                <div id="link-container" class="hidden space-y-4">
                    <div class="p-4 bg-zinc-900 border border-zinc-800 rounded-xl break-all text-sm font-mono text-zinc-400" id="share-url"></div>
                    <button onclick="copyLink()" class="w-full bg-blue-600 h-14 rounded-xl font-bold active:scale-95 transition-transform">
                        COPIAR ENLACE
                    </button>
                    <p class="text-xs text-zinc-500">Envía este enlace a la otra persona.</p>
                </div>
                <button onclick="location.reload()" class="text-zinc-500 text-sm underline">Cancelar</button>
            </div>

            <!-- Vista Tracker (Usuario B) -->
            <div id="view-tracker" class="hidden flex-1 flex flex-col items-center justify-between py-4">
                <div class="text-center">
                    <div class="text-6xl font-black tracking-tighter" id="dist-val">0</div>
                    <div class="text-zinc-500 font-bold uppercase tracking-widest">Metros</div>
                </div>

                <div class="relative w-72 h-72 flex items-center justify-center">
                    <!-- Circulos de fondo -->
                    <div class="absolute inset-0 border border-zinc-800 rounded-full"></div>
                    <div class="absolute inset-10 border border-zinc-800 rounded-full"></div>
                    
                    <!-- Flecha -->
                    <div id="arrow-container" class="compass-arrow w-full h-full flex items-center justify-center">
                        <svg viewBox="0 0 100 100" class="w-24 h-24 fill-blue-500">
                            <path d="M50 0 L95 85 L50 70 L5 85 Z" />
                        </svg>
                    </div>
                </div>

                <div class="text-center space-y-2">
                    <div id="dir-text" class="text-xl font-bold uppercase text-white">CALIBRANDO...</div>
                    <div class="text-xs text-zinc-600 max-w-[200px]">Apunta la parte superior de tu móvil hacia adelante</div>
                </div>

                <button onclick="location.href='index.html'" class="w-full border border-zinc-800 h-12 rounded-xl text-zinc-500 text-sm">
                    SALIR
                </button>
            </div>

        </main>
    </div>

    <script>
        let targetCoords = null;
        let deviceHeading = 0;
        let watchId = null;

        // Al cargar, verificar si hay coordenadas en la URL
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const lat = params.get('lat');
            const lon = params.get('lon');

            if (lat && lon) {
                targetCoords = { lat: parseFloat(lat), lon: parseFloat(lon) };
                startB();
            }
        };

        // LÓGICA USUARIO A
        function startA() {
            showView('creating');
            if (!navigator.geolocation) return alert("GPS no soportado");

            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude.toFixed(6);
                const lon = pos.coords.longitude.toFixed(6);
                const url = `${window.location.origin}${window.location.pathname}?lat=${lat}&lon=${lon}`;
                
                document.getElementById('gps-status').innerText = "¡UBICACIÓN FIJADA!";
                document.getElementById('link-container').classList.remove('hidden');
                document.getElementById('share-url').innerText = url;
                window.generatedUrl = url;
            }, err => {
                alert("Error de GPS: " + err.message);
                location.reload();
            }, { enableHighAccuracy: true });
        }

        function copyLink() {
            const el = document.createElement('textarea');
            el.value = window.generatedUrl;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Enlace copiado al portapapeles");
        }

        // LÓGICA USUARIO B
        function startB() {
            showView('tracker');
            
            // Solicitar permisos de orientación (iOS 13+)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }

            // Iniciar seguimiento GPS
            watchId = navigator.geolocation.watchPosition(pos => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, targetCoords.lat, targetCoords.lon);
                const bearing = calculateBearing(pos.coords.latitude, pos.coords.longitude, targetCoords.lat, targetCoords.lon);
                
                updateTrackerUI(dist, bearing);
            }, err => console.error(err), { enableHighAccuracy: true });
        }

        function handleOrientation(e) {
            // Brújula: 0 es Norte
            deviceHeading = e.webkitCompassHeading || (360 - e.alpha) || 0;
        }

        function updateTrackerUI(dist, bearing) {
            document.getElementById('dist-val').innerText = Math.round(dist);
            
            // El ángulo de la flecha es (Rumbo al objetivo - Orientación del móvil)
            const arrowAngle = (bearing - deviceHeading + 360) % 360;
            document.getElementById('arrow-container').style.transform = `rotate(${arrowAngle}deg)`;

            // Texto descriptivo
            const dirText = document.getElementById('dir-text');
            if (arrowAngle < 20 || arrowAngle > 340) dirText.innerText = "Sigue Adelante";
            else if (arrowAngle >= 20 && arrowAngle < 160) dirText.innerText = "Gira a la Derecha";
            else if (arrowAngle >= 160 && arrowAngle < 200) dirText.innerText = "Está detrás tuyo";
            else dirText.innerText = "Gira a la Izquierda";
        }

        // MATH UTILS
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const y = Math.sin(dl) * Math.cos(p2);
            const x = Math.cos(p1) * Math.sin(p2) - Math.sin(p1) * Math.cos(p2) * Math.cos(dl);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function showView(id) {
            ['home', 'creating', 'tracker'].forEach(v => document.getElementById('view-'+v).classList.add('hidden'));
            document.getElementById('view-'+id).classList.remove('hidden');
        }
    </script>
</body>
</html>
