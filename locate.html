<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-LOCATOR v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        body { font-family: 'JetBrains Mono', monospace; }
        .radar-scan {
            background: conic-gradient(from 0deg, rgba(239, 68, 68, 0.2) 0deg, rgba(239, 68, 68, 0) 90deg);
            animation: rotate 4s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .glitch-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="bg-[#050505] text-zinc-100 min-h-screen flex flex-col overflow-x-hidden">

    <!-- Header de Diagnóstico -->
    <header class="p-4 border-b border-zinc-800 bg-black/80 backdrop-blur-sm flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div id="status-led" class="w-2 h-2 rounded-full bg-zinc-600"></div>
            <h1 class="text-xs font-bold tracking-widest text-zinc-400 uppercase">CORE // LOCATOR <span class="text-red-600">V3.0</span></h1>
        </div>
        <div id="status-text" class="text-[9px] font-bold text-zinc-500 uppercase px-2 py-1 bg-zinc-900 rounded border border-zinc-800">Iniciando Protocolos...</div>
    </header>

    <main class="flex-grow p-4 flex flex-col items-center justify-center max-w-md mx-auto w-full">
        
        <!-- UI: Configuración Inicial -->
        <div id="ui-setup" class="w-full space-y-6">
            <div class="text-center space-y-2 mb-8">
                <div class="text-4xl font-black text-red-600 tracking-tighter">SISTEMA OFF-GRID</div>
                <p class="text-[10px] text-zinc-500 uppercase tracking-widest leading-tight">Geoposicionamiento en Tiempo Real mediante Enlace de Datos Distribuido</p>
            </div>

            <div class="bg-zinc-900/50 p-1 border border-zinc-800 rounded-lg">
                <input id="session-id" type="text" placeholder="ID DE OPERACIÓN (EJ: DELTA-9)" 
                    class="w-full bg-black border-none p-4 rounded text-center font-bold text-red-500 focus:ring-1 focus:ring-red-600 uppercase tracking-widest">
            </div>

            <div class="grid grid-cols-1 gap-3">
                <button onclick="launch('A')" class="bg-red-600 hover:bg-red-700 text-white font-bold p-5 rounded-lg transition-all active:scale-95 shadow-lg shadow-red-900/20 uppercase text-xs">
                    Activar Baliza (Usuario A)
                </button>
                <button onclick="launch('B')" class="bg-zinc-100 hover:bg-white text-black font-bold p-5 rounded-lg transition-all active:scale-95 uppercase text-xs">
                    Iniciar Rastreo (Usuario B)
                </button>
            </div>
        </div>

        <!-- UI: Transmisor (Usuario A) -->
        <div id="ui-role-a" class="hidden w-full space-y-8 animate-pulse">
            <div class="relative w-64 h-64 mx-auto flex items-center justify-center">
                <div class="absolute inset-0 border-2 border-red-600/20 rounded-full"></div>
                <div class="absolute inset-0 radar-scan rounded-full"></div>
                <div class="w-8 h-8 bg-red-600 rounded-full shadow-[0_0_20px_#ef4444] z-10"></div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-black text-white tracking-widest mb-1">TRANSMITIENDO</div>
                <div id="a-coords" class="text-[10px] text-zinc-500">BUSCANDO SEÑAL GPS...</div>
            </div>
            <div class="bg-red-600/5 border border-red-600/20 p-4 rounded text-center">
                <div class="text-[9px] text-zinc-500 uppercase mb-1">ID DE CANAL</div>
                <div id="display-sid" class="text-lg font-bold text-red-500">---</div>
            </div>
        </div>

        <!-- UI: Receptor (Usuario B) -->
        <div id="ui-role-b" class="hidden w-full space-y-6">
            <div class="relative w-72 h-72 mx-auto bg-zinc-900 rounded-full border-4 border-zinc-800 shadow-2xl flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 opacity-10 flex items-center justify-center text-[10px]">
                    <div class="absolute top-4">N</div>
                    <div class="absolute bottom-4">S</div>
                    <div class="absolute right-4">E</div>
                    <div class="absolute left-4">W</div>
                </div>
                
                <div id="nav-arrow" class="absolute w-full h-full flex flex-col items-center justify-center transition-transform duration-500">
                    <div class="w-1 h-24 bg-gradient-to-t from-transparent via-red-600 to-red-500 rounded-full"></div>
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="#ef4444" class="drop-shadow-[0_0_10px_rgba(239,68,68,0.5)]"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
                </div>
                
                <div id="dist-overlay" class="z-20 text-4xl font-black text-white bg-black/40 px-4 py-2 rounded-lg backdrop-blur-sm border border-white/10 shadow-2xl">---</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                    <div class="text-[9px] text-zinc-500 uppercase mb-1 font-bold">Rumbo</div>
                    <div id="bearing-val" class="text-xl font-bold text-zinc-200">0°</div>
                </div>
                <div class="bg-zinc-900 p-4 rounded border border-zinc-800">
                    <div class="text-[9px] text-zinc-500 uppercase mb-1 font-bold">Estado</div>
                    <div id="signal-quality" class="text-xl font-bold text-red-500">SIN SEÑAL</div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal de Error Forzado -->
    <div id="error-modal" class="hidden fixed inset-0 bg-black/95 z-[100] p-10 flex flex-col items-center justify-center text-center">
        <div class="text-red-600 text-6xl mb-6">⚠️</div>
        <div class="text-xl font-bold mb-2">FALLO DE SISTEMA</div>
        <p id="error-msg" class="text-zinc-500 text-sm mb-8"></p>
        <button onclick="location.reload()" class="bg-zinc-800 px-6 py-2 rounded font-bold">REINTENTAR</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // CONFIGURACIÓN E INICIALIZACIÓN
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'core_loc_3';

        let user = null;
        let activeSession = null;

        // SISTEMA DE RECONEXIÓN EXPONENCIAL / HARD-AUTH
        async function connect() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Conexión fallida, reintentando...", err);
                setTimeout(connect, 2000);
            }
        }

        onAuthStateChanged(auth, (u) => {
            if (u) {
                user = u;
                document.getElementById('status-led').classList.replace('bg-zinc-600', 'bg-green-500');
                document.getElementById('status-text').innerText = "SISTEMA ONLINE";
                document.getElementById('status-text').classList.replace('text-zinc-500', 'text-green-500');
            }
        });

        connect();

        window.launch = (role) => {
            const sid = document.getElementById('session-id').value.trim().toUpperCase();
            if (!sid) return alert("INTRODUZCA ID DE SESIÓN");
            if (!user) return alert("SISTEMA CONECTANDO... ESPERE");

            activeSession = sid;
            document.getElementById('ui-setup').classList.add('hidden');

            if (role === 'A') {
                document.getElementById('ui-role-a').classList.remove('hidden');
                document.getElementById('display-sid').innerText = sid;
                startBeacon();
            } else {
                document.getElementById('ui-role-b').classList.remove('hidden');
                startTracking();
            }
        };

        // LÓGICA USUARIO A (TRANSMISOR)
        function startBeacon() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', activeSession);
            
            navigator.geolocation.watchPosition(async (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                document.getElementById('a-coords').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)} (±${Math.round(accuracy)}m)`;
                
                try {
                    await setDoc(docRef, {
                        lat: latitude,
                        lng: longitude,
                        t: Date.now(),
                        acc: accuracy
                    }, { merge: true });
                } catch (e) { console.error(e); }
            }, (err) => {
                showError("GPS BLOQUEADO O NO DISPONIBLE.");
            }, { enableHighAccuracy: true, maximumAge: 0 });
        }

        // LÓGICA USUARIO B (RECEPTOR)
        function startTracking() {
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'sessions', activeSession);
            
            onSnapshot(docRef, (snap) => {
                if (snap.exists()) {
                    const target = snap.data();
                    navigator.geolocation.getCurrentPosition((myPos) => {
                        updateNavigation(myPos.coords, target);
                    }, null, { enableHighAccuracy: true });
                } else {
                    document.getElementById('signal-quality').innerText = "BUSCANDO A...";
                }
            }, (err) => showError("ERROR DE ENLACE FIRESTORE."));
        }

        function updateNavigation(me, target) {
            const dist = getDist(me.latitude, me.longitude, target.lat, target.lng);
            const bearing = getBearing(me.latitude, me.longitude, target.lat, target.lng);

            document.getElementById('dist-overlay').innerText = dist > 999 ? (dist/1000).toFixed(1) + "km" : Math.round(dist) + "m";
            document.getElementById('bearing-val').innerText = Math.round(bearing) + "°";
            document.getElementById('nav-arrow').style.transform = `rotate(${bearing}deg)`;
            document.getElementById('signal-quality').innerText = "ACTIVA";
            document.getElementById('signal-quality').classList.replace('text-red-500', 'text-green-500');
        }

        // MATH
        function getDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2)**2 + Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function getBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1) * Math.PI/180) * Math.cos(lat2 * Math.PI/180);
            const x = Math.cos(lat1 * Math.PI/180) * Math.sin(lat2 * Math.PI/180) -
                      Math.sin(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.cos((lon2-lon1) * Math.PI/180);
            return (Math.atan2(y, x) * 180/Math.PI + 360) % 360;
        }

        function showError(m) {
            document.getElementById('error-msg').innerText = m;
            document.getElementById('error-modal').classList.remove('hidden');
        }
    </script>
</body>
</html>
