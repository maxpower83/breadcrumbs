
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORE-SYSTEM: NEURAL DECAY</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap');

        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: filter 0.5s ease;
        }

        .crt::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .glitch {
            animation: glitch-anim 0.2s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        #terminal-output::-webkit-scrollbar { width: 0; }
        
        .scanline {
            width: 100%;
            height: 100px;
            z-index: 3;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(0, 255, 65, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1;
            position: absolute;
            bottom: 100%;
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .entropy-invert { filter: invert(100%); }
        .entropy-blur { filter: blur(2px); }
        .entropy-rotate { transform: rotate(1deg); }
    </style>
</head>
<body class="crt p-4 md:p-8">
    <div class="scanline"></div>
    
    <!-- Header -->
    <div class="flex justify-between items-start mb-6 border-b border-green-900 pb-2">
        <div>
            <h1 class="text-xl font-bold tracking-tighter" id="core-title">CORE-SYSTEM // NEURAL_DECAY_V.01</h1>
            <p class="text-xs opacity-50">STATUS: CRITICAL_DEGRADATION</p>
        </div>
        <div class="text-right">
            <p class="text-xs">STABILITY</p>
            <div class="w-32 h-2 bg-green-900 mt-1">
                <div id="stability-bar" class="h-full bg-green-400 transition-all duration-500" style="width: 100%;"></div>
            </div>
        </div>
    </div>

    <!-- Main Terminal -->
    <div id="terminal-container" class="flex-grow flex flex-col overflow-hidden bg-black bg-opacity-50 border border-green-900 p-4 rounded shadow-2xl relative">
        <div id="terminal-output" class="flex-grow overflow-y-auto mb-4 text-sm space-y-1">
            <div class="text-yellow-500">[SYSTEM] Initializing CORE emergency bypass...</div>
            <div class="text-yellow-500">[SYSTEM] Warning: Synaptic pathways collapsing.</div>
            <div class="text-white mt-4">TYPE 'HELP' TO LIST COMMANDS.</div>
        </div>
        
        <div class="flex items-center text-sm border-t border-green-900 pt-4">
            <span class="mr-2 text-green-400">ARCHITECT@CORE:~$</span>
            <input type="text" id="terminal-input" autofocus 
                   class="bg-transparent border-none outline-none flex-grow text-green-400 caret-green-500"
                   autocomplete="off" spellcheck="false">
        </div>
    </div>

    <!-- Entropy Overlay (for serious failures) -->
    <div id="entropy-layer" class="fixed inset-0 pointer-events-none z-50 transition-opacity duration-1000 opacity-0 bg-red-900 mix-blend-overlay"></div>

    <script>
        const input = document.getElementById('terminal-input');
        const output = document.getElementById('terminal-output');
        const stabilityBar = document.getElementById('stability-bar');
        const coreTitle = document.getElementById('core-title');
        
        let stability = 100;
        let decayRate = 0.5;
        let isDead = false;

        const commands = {
            'HELP': () => "AVAILABLE: [PURGE] [STABILIZE] [DECODE] [INFO] [NULL]",
            'INFO': () => "CORE UNIT: 0xARCHITECT. STATUS: Memory leak detected in sector 7G. Instability is increasing.",
            'STABILIZE': () => {
                if (stability < 20) {
                    return "ERROR: Critical failure. Stabilization impossible.";
                }
                stability = Math.min(100, stability + 15);
                decayRate += 0.1; // Using the core makes it hotter/unstable
                return "SUCCESS: Synaptic reinforcement applied. Decay rate increased.";
            },
            'PURGE': () => {
                output.innerHTML = '';
                return "LOGS PURGED. RAM FREED.";
            },
            'DECODE': () => {
                const hex = Array.from({length: 20}, () => Math.floor(Math.random()*16).toString(16)).join('');
                return `DECODING SECTOR... [${hex}] -> REASON: EXISTENTIAL_DREAD_EXCEPTION`;
            }
        };

        function print(text, color = "text-green-400") {
            const line = document.createElement('div');
            line.className = color;
            line.innerHTML = `> ${text}`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function triggerEntropy() {
            if (stability < 70) {
                document.body.classList.add('entropy-rotate');
            }
            if (stability < 40) {
                document.body.classList.add('glitch');
                document.body.style.filter = `hue-rotate(${100 - stability}deg)`;
            }
            if (stability < 20) {
                document.body.classList.add('entropy-blur');
                if (Math.random() > 0.8) {
                    coreTitle.innerText = "C0R3_SY5T3M_F41LUR3";
                }
            }
            
            // Random character corruption in the DOM
            if (stability < 50 && Math.random() > 0.7) {
                const allElements = document.querySelectorAll('div, p, h1, span');
                const target = allElements[Math.floor(Math.random() * allElements.length)];
                if (target.children.length === 0) {
                    target.innerText = target.innerText.replace(/[a-zA-Z]/g, () => 
                        String.fromCharCode(33 + Math.floor(Math.random() * 60))
                    );
                }
            }
        }

        function gameLoop() {
            if (isDead) return;

            stability -= decayRate;
            stabilityBar.style.width = `${stability}%`;

            if (stability <= 0) {
                die();
            } else {
                triggerEntropy();
                setTimeout(gameLoop, 1000);
            }
        }

        function die() {
            isDead = true;
            document.body.innerHTML = `
                <div class="flex items-center justify-center h-full w-full bg-red-950 text-white font-bold text-4xl glitch">
                    CORE_DEATH: TOTAL_NEURAL_COLLAPSE
                </div>
            `;
            setTimeout(() => {
                document.body.innerHTML = "";
                document.body.style.backgroundColor = "black";
            }, 3000);
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = input.value.toUpperCase().trim();
                input.value = '';
                
                if (val === '') return;

                print(val, "text-white font-bold");

                if (commands[val]) {
                    const result = commands[val]();
                    setTimeout(() => print(result, "text-blue-400"), 200);
                } else {
                    setTimeout(() => print(`COMMAND NOT FOUND: ${val}`, "text-red-500"), 200);
                    stability -= 2; // Penalty for wrong commands
                }
            }
        });

        // Initialize
        window.onload = () => {
            print("NEURAL_LINK_ESTABLISHED", "text-yellow-500");
            gameLoop();
        };
    </script>
</body>
</html>
