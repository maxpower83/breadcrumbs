<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SPOON GOD</title>
    <style>
        :root {
            --spoon-color: #d2b48c;
            --bg: #111;
            --glow: 0px;
            --scale: 1;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Comic Sans MS', cursive; /* Aposta por lo estúpido */
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            transition: background 0.5s;
        }

        #altar {
            position: relative;
            width: 300px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        #spoon {
            width: 60px;
            height: 200px;
            background: var(--spoon-color);
            border-radius: 50% 50% 40% 40% / 30% 30% 70% 70%;
            position: relative;
            box-shadow: 0 0 var(--glow) #fff;
            transform: scale(var(--scale));
            transition: transform 0.1s, background 0.3s;
        }

        #spoon::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: 20px;
            width: 20px;
            height: 120px;
            background: inherit;
            border-radius: 0 0 5px 5px;
        }

        #stats {
            position: fixed;
            top: 20px;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }

        .btn-sacrifice {
            position: fixed;
            bottom: 20px;
            background: transparent;
            border: 1px solid #444;
            color: #444;
            padding: 10px;
            cursor: pointer;
            font-size: 10px;
        }

        #msg {
            position: fixed;
            bottom: 80px;
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
        }

        .burning {
            background: #222 !important;
            filter: blur(2px);
        }
    </style>
</head>
<body>

    <div id="stats">
        <h1 id="title">ADORA A LA CUCHARA</h1>
        <div id="faith-meter">FE: <span id="faith-val">0</span></div>
        <div id="heat-meter">CALOR: <span id="heat-val">0</span>%</div>
    </div>

    <div id="altar">
        <div id="spoon"></div>
    </div>

    <div id="msg">FROTA PARA LA ILUMINACIÓN</div>

    <button class="btn-sacrifice" onclick="sacrifice(this)">SACRIFICAR ESTE BOTÓN</button>

    <script>
        let faith = 0;
        let heat = 0;
        let scale = 1;
        const spoon = document.getElementById('spoon');
        const faithVal = document.getElementById('faith-val');
        const heatVal = document.getElementById('heat-val');
        const msg = document.getElementById('msg');
        const title = document.getElementById('title');

        let isDown = false;
        let lastPos = {x: 0, y: 0};

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playTone(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function handleMove(e) {
            if (!isDown || heat > 100) return;

            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;

            const dist = Math.hypot(clientX - lastPos.x, clientY - lastPos.y);
            
            if (dist > 5) {
                faith += 0.1;
                heat += 0.5;
                updateUI();
                playTone(200 + (heat * 10));
                
                document.documentElement.style.setProperty('--glow', `${heat/2}px`);
                
                if (heat > 80) {
                    msg.innerText = "¡DEMASIADO CALOR! SE VA A QUEMAR";
                    spoon.classList.add('burning');
                }
            }

            lastPos = {x: clientX, y: clientY};
        }

        function updateUI() {
            faithVal.innerText = Math.floor(faith);
            heatVal.innerText = Math.floor(heat);
            document.documentElement.style.setProperty('--scale', scale);
        }

        function sacrifice(btn) {
            if (faith < 10) {
                msg.innerText = "NO TIENES SUFICIENTE FE";
                return;
            }
            faith -= 10;
            scale += 0.2;
            btn.style.display = 'none';
            msg.innerText = "HAS SACRIFICADO LA FUNCIONALIDAD POR EL TAMAÑO";
            updateUI();
        }

        // Enfriamiento natural
        setInterval(() => {
            if (heat > 0) {
                heat -= 1;
                if (heat < 80) {
                    spoon.classList.remove('burning');
                    msg.innerText = "FROTA PARA LA ILUMINACIÓN";
                }
                updateUI();
            }
        }, 100);

        window.addEventListener('mousedown', (e) => { isDown = true; lastPos = {x: e.clientX, y: e.clientY}; });
        window.addEventListener('mouseup', () => isDown = false);
        window.addEventListener('mousemove', handleMove);

        window.addEventListener('touchstart', (e) => { isDown = true; lastPos = {x: e.touches[0].clientX, y: e.touches[0].clientY}; });
        window.addEventListener('touchend', () => isDown = false);
        window.addEventListener('touchmove', handleMove);

        // Locura aleatoria: La cuchara te habla
        setInterval(() => {
            if (faith > 50 && Math.random() > 0.8) {
                const phrases = ["SOY DE MADERA", "EL TENEDOR ES UN FALSO PROFETA", "DAME MÁS PÍXELES", "¿SABES QUÉ HORA ES?"];
                title.innerText = phrases[Math.floor(Math.random()*phrases.length)];
            }
        }, 3000);

    </script>
</body>
</html>
