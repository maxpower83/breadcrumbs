<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Acierta el Número - Racha Infinita</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { 
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(145deg, #0f0c29, #302b63, #24243e);
        }
        .game-container {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 30px 25px;
            width: 360px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.15);
        }
        h1 { color: #f5e9ff; font-size: 26px; letter-spacing: 2px; text-shadow: 0 0 15px #a855f7; }
        .stats {
            display: flex; justify-content: space-around; margin: 20px 0 15px;
            color: #cbd5e1; font-weight: bold; font-size: 18px;
        }
        .stats span { background: rgba(0,0,0,0.4); padding: 6px 16px; border-radius: 40px; }
        .vidas { color: #f87171; }
        .rango { background: #1e1b4b; padding: 10px; border-radius: 50px; color: #e2e8f0; margin-bottom: 20px; font-size: 20px; }
        .input-group {
            display: flex; gap: 8px; justify-content: center; margin: 18px 0;
        }
        input {
            width: 100px; padding: 14px; font-size: 22px; text-align: center;
            border: none; border-radius: 16px; background: #1e293b;
            color: white; outline: 2px solid #4f46e5;
        }
        input:focus { outline: 3px solid #a855f7; }
        button {
            padding: 14px 24px; border: none; border-radius: 16px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white; font-weight: bold; font-size: 18px; cursor: pointer;
            transition: 0.2s; box-shadow: 0 6px 0 #312e81;
        }
        button:active { transform: translateY(4px); box-shadow: 0 2px 0 #312e81; }
        button:disabled { opacity: 0.5; transform: translateY(0); box-shadow: none; }
        .mensaje { height: 50px; margin: 12px 0; font-size: 20px; font-weight: bold; color: #fbbf24; }
        .historial {
            background: rgba(0,0,0,0.3); border-radius: 20px; padding: 10px;
            max-height: 140px; overflow-y: auto; font-size: 14px; color: #94a3b8;
            text-align: left; margin-top: 10px;
        }
        .historial div { padding: 4px 0; border-bottom: 1px solid #334155; }
        .btn-reinicio {
            margin-top: 15px; background: #334155; box-shadow: 0 4px 0 #1e293b;
            width: 100%; padding: 12px; font-size: 16px;
        }
        .monetizacion {
            margin-top: 12px; display: flex; justify-content: center; gap: 20px;
            color: #facc15; font-size: 14px;
        }
        .monetizacion span { cursor: pointer; background: #1e293b; padding: 6px 14px; border-radius: 30px; }
        .monetizacion span:hover { background: #334155; }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎯 ACIERTA EL NÚMERO</h1>
    <div class="stats">
        <span class="vidas">❤️ <span id="vidas">3</span></span>
        <span>🏆 Racha <span id="racha">0</span></span>
        <span>🎯 Intentos <span id="intentos">0</span></span>
    </div>
    <div class="rango">🔢 1 - <span id="rangoMax">50</span></div>
    <div class="input-group">
        <input type="number" id="entrada" placeholder="?" min="1" max="50">
        <button id="btnProbar">🔥 Probar</button>
    </div>
    <div class="mensaje" id="mensaje">¡Adivina el número!</div>
    <div class="historial" id="historial"></div>
    <button class="btn-reinicio" id="btnReinicio">🔄 Nueva Partida</button>
    <div class="monetizacion">
        <span id="publiVida">📺 +1 vida (ver anuncio)</span>
        <span id="publiRacha">⭐ +5 racha (ver anuncio)</span>
    </div>
</div>

<script>
    // ===== CONFIGURACIÓN DEL JUEGO =====
    let numeroSecreto, rangoMax = 50;
    let vidas = 3, racha = 0, intentos = 0;
    let juegoActivo = true;
    const historial = [];

    // Elementos DOM
    const entrada = document.getElementById('entrada');
    const btnProbar = document.getElementById('btnProbar');
    const btnReinicio = document.getElementById('btnReinicio');
    const mensajeEl = document.getElementById('mensaje');
    const vidasEl = document.getElementById('vidas');
    const rachaEl = document.getElementById('racha');
    const intentosEl = document.getElementById('intentos');
    const rangoMaxEl = document.getElementById('rangoMax');
    const historialEl = document.getElementById('historial');
    const publiVida = document.getElementById('publiVida');
    const publiRacha = document.getElementById('publiRacha');

    // ===== FUNCIONES PRINCIPALES =====
    function iniciarJuego() {
        numeroSecreto = Math.floor(Math.random() * rangoMax) + 1;
        juegoActivo = true;
        vidas = 3;
        intentos = 0;
        historial.length = 0;
        entrada.value = '';
        entrada.disabled = false;
        btnProbar.disabled = false;
        entrada.focus();
        actualizarUI();
        mensajeEl.textContent = '🔮 ¡Nuevo número!';
        mensajeEl.style.color = '#fbbf24';
        historialEl.innerHTML = '';
        rangoMaxEl.textContent = rangoMax;
    }

    function probarNumero() {
        if (!juegoActivo) {
            mensajeEl.textContent = '⛔ Partida terminada. Reinicia.';
            return;
        }
        const valor = parseInt(entrada.value);
        if (isNaN(valor) || valor < 1 || valor > rangoMax) {
            mensajeEl.textContent = `❌ Ingresa un número entre 1 y ${rangoMax}`;
            entrada.value = '';
            return;
        }

        intentos++;
        let mensaje = '';
        let color = '#fbbf24';

        if (valor === numeroSecreto) {
            // ¡ACERTÓ!
            racha += 5;  // +5 por acertar
            mensaje = `🎉 ¡ACERTASTE! +5 racha`;
            color = '#4ade80';
            juegoActivo = false;
            btnProbar.disabled = true;
            entrada.disabled = true;
            // Aumentamos la dificultad
            rangoMax = Math.min(rangoMax + 10, 200);
            historial.push(`✅ ${valor} (¡ACERTO!) - Rango +10`);
        } else {
            let pista = valor < numeroSecreto ? '⬆️ MÁS ALTO' : '⬇️ MÁS BAJO';
            vidas--;
            mensaje = `${pista} | Te quedan ${vidas} vidas`;
            color = '#f87171';
            historial.push(`❌ ${valor} - ${pista}`);

            if (vidas <= 0) {
                mensaje = `💀 PERDISTE. El número era ${numeroSecreto}`;
                color = '#ef4444';
                juegoActivo = false;
                btnProbar.disabled = true;
                entrada.disabled = true;
                racha = 0; // Se pierde la racha si mueres
            }
        }

        mensajeEl.textContent = mensaje;
        mensajeEl.style.color = color;
        actualizarUI();
        entrada.value = '';
        if (juegoActivo) entrada.focus();
        actualizarHistorial();
    }

    // ===== ACTUALIZACIONES DE UI =====
    function actualizarUI() {
        vidasEl.textContent = vidas;
        rachaEl.textContent = racha;
        intentosEl.textContent = intentos;
    }

    function actualizarHistorial() {
        historialEl.innerHTML = historial.slice(-6).reverse().map(h => `<div>${h}</div>`).join('');
    }

    // ===== MONETIZACIÓN SIMULADA (con anuncios falsos) =====
    function verAnuncio(tipo) {
        // Simula la reproducción de un anuncio de 2 segundos
        mensajeEl.textContent = '📺 Cargando anuncio...';
        mensajeEl.style.color = '#facc15';
        btnProbar.disabled = true;
        entrada.disabled = true;

        setTimeout(() => {
            if (tipo === 'vida') {
                if (!juegoActivo) {
                    mensajeEl.textContent = '⚠️ Reinicia la partida para usar la vida';
                    mensajeEl.style.color = '#f87171';
                } else {
                    vidas = Math.min(vidas + 1, 5);
                    mensajeEl.textContent = '❤️ ¡Vida extra recibida!';
                    mensajeEl.style.color = '#4ade80';
                    actualizarUI();
                }
            } else if (tipo === 'racha') {
                if (!juegoActivo) {
                    mensajeEl.textContent = '⚠️ Reinicia la partida para usar la racha';
                    mensajeEl.style.color = '#f87171';
                } else {
                    racha += 5;
                    mensajeEl.textContent = '⭐ ¡Racha +5!';
                    mensajeEl.style.color = '#facc15';
                    actualizarUI();
                }
            }
            btnProbar.disabled = !juegoActivo;
            entrada.disabled = !juegoActivo;
            if (juegoActivo) entrada.focus();
        }, 1500); // Simula 1.5 segundos de anuncio
    }

    // ===== EVENTOS =====
    btnProbar.addEventListener('click', probarNumero);
    btnReinicio.addEventListener('click', iniciarJuego);
    entrada.addEventListener('keydown', (e) => { if (e.key === 'Enter') probarNumero(); });

    publiVida.addEventListener('click', () => verAnuncio('vida'));
    publiRacha.addEventListener('click', () => verAnuncio('racha'));

    // ===== INICIO =====
    iniciarJuego();
</script>
</body>
</html>
