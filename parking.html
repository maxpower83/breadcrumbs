<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking Ghost | CORE</title>
    <link rel="manifest" id="pwa-manifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #050505; color: #eee; }
        .arrow { width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-bottom: 30px solid #3b82f6; transition: transform 0.1s linear; }
    </style>
</head>
<body class="p-6 flex flex-col min-h-screen">
    <header class="mb-6 border-l-4 border-blue-600 pl-4 flex justify-between items-center">
        <div>
            <a href="index.html" class="text-[10px] text-zinc-600 uppercase">← Hub</a>
            <h1 class="text-xl font-bold uppercase italic text-white">Parking Ghost</h1>
        </div>
        <button id="installBtn" class="hidden bg-white text-black px-3 py-1 rounded text-[10px] font-bold uppercase">Instalar</button>
    </header>

    <main class="flex-grow space-y-4">
        <div id="radar" class="hidden bg-zinc-900 border border-zinc-800 p-8 rounded-full aspect-square flex flex-col items-center justify-center mx-auto max-w-[250px]">
            <div id="arrow" class="arrow mb-4"></div>
            <p id="dist" class="text-xl font-bold text-blue-400">--- M</p>
        </div>

        <div class="bg-zinc-900 p-6 rounded-lg text-center border border-zinc-800">
            <p class="text-[10px] text-zinc-500 uppercase mb-1">Último registro:</p>
            <div id="note" class="text-2xl font-bold text-white uppercase italic">Libre</div>
            <div id="ts" class="text-[9px] text-zinc-600 mt-2">---</div>
        </div>

        <div class="space-y-3">
            <input type="text" id="manual" placeholder="PLTA / COLOR / LETRA" class="w-full p-4 bg-zinc-900 border border-zinc-800 rounded text-center text-white outline-none">
            <button onclick="setParking()" class="w-full bg-blue-600 py-4 rounded font-bold uppercase text-sm">Fijar Posición GPS</button>
            <button onclick="resetParking()" class="w-full text-zinc-700 text-[10px] uppercase font-bold py-2">Resetear</button>
        </div>
    </main>

    <script>
        let watchId = null;
        let target = JSON.parse(localStorage.getItem('p_ghost_v2')) || null;

        function setParking() {
            if (!navigator.geolocation) return alert("GPS No disponible");
            navigator.geolocation.getCurrentPosition(pos => {
                target = {
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    note: document.getElementById('manual').value.toUpperCase() || "SIN NOTA",
                    ts: new Date().toLocaleTimeString()
                };
                localStorage.setItem('p_ghost_v2', JSON.stringify(target));
                startTrack();
                render();
            }, null, {enableHighAccuracy: true});
        }

        function startTrack() {
            if (!target) return;
            document.getElementById('radar').classList.remove('hidden');
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition(pos => {
                const dist = calculateDist(pos.coords.latitude, pos.coords.longitude, target.lat, target.lng);
                const bearing = calculateBearing(pos.coords.latitude, pos.coords.longitude, target.lat, target.lng);
                document.getElementById('dist').innerText = `${Math.round(dist)} M`;
                document.getElementById('arrow').style.transform = `rotate(${bearing}deg)`;
            }, null, {enableHighAccuracy: true});
        }

        function calculateDist(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2-lon1)*Math.PI/180) * Math.cos(lat2*Math.PI/180);
            const x = Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);
            return (Math.atan2(y, x)*180/Math.PI + 360) % 360;
        }

        function resetParking() {
            localStorage.removeItem('p_ghost_v2');
            target = null;
            if (watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('radar').classList.add('hidden');
            render();
        }

        function render() {
            if (target) {
                document.getElementById('note').innerText = target.note;
                document.getElementById('ts').innerText = `FIJADO: ${target.ts}`;
            } else {
                document.getElementById('note').innerText = "LIBRE";
                document.getElementById('ts').innerText = "---";
            }
        }

        window.onload = () => { render(); startTrack(); };

        const manifest = { "name": "Parking Ghost", "short_name": "ParkGhost", "start_url": "parking.html", "display": "standalone", "theme_color": "#3b82f6" };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;base64,' + btoa(JSON.stringify(manifest)));
    </script>
</body>
</html>
