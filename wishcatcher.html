<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wish Catcher | CORE</title>
    <link rel="manifest" id="pwa-manifest">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #050505; color: #a1a1aa; }
        .group-card { background: #111; border: 1px solid #222; margin-bottom: 1rem; border-radius: 8px; overflow: hidden; }
        .item-row { border-bottom: 1px solid #1a1a1a; padding: 0.75rem 1rem; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body class="p-6 max-w-2xl mx-auto min-h-screen">
    <header class="mb-8 border-l-4 border-pink-600 pl-4 flex justify-between items-center">
        <div>
            <a href="index.html" class="text-[10px] text-zinc-600 uppercase">← Hub</a>
            <h1 class="text-xl font-bold uppercase italic text-white">Wish Catcher</h1>
        </div>
        <button id="installBtn" class="hidden bg-white text-black px-3 py-1 rounded text-[10px] font-bold uppercase">Instalar</button>
    </header>

    <div class="bg-zinc-900 p-4 rounded-lg border border-zinc-800 mb-8">
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input type="text" id="pName" placeholder="NOMBRE" class="p-2 rounded bg-black border border-zinc-800 text-white uppercase text-xs">
            <input type="text" id="pWish" placeholder="DESEO" class="p-2 rounded bg-black border border-zinc-800 text-white uppercase text-xs">
        </div>
        <button onclick="addWish()" class="w-full bg-pink-700 py-2 rounded text-white font-bold text-xs uppercase">Capturar</button>
    </div>

    <div id="container"></div>

    <script>
        let data = JSON.parse(localStorage.getItem('core_wish_v2')) || {};

        function addWish() {
            const name = document.getElementById('pName').value.trim().toUpperCase();
            const wish = document.getElementById('pWish').value.trim();
            if (!name || !wish) return;

            if (!data[name]) data[name] = [];
            data[name].unshift({ text: wish, id: Date.now() });
            
            localStorage.setItem('core_wish_v2', JSON.stringify(data));
            document.getElementById('pWish').value = '';
            render();
        }

        function deleteItem(name, id) {
            data[name] = data[name].filter(i => i.id !== id);
            if (data[name].length === 0) delete data[name];
            localStorage.setItem('core_wish_v2', JSON.stringify(data));
            render();
        }

        function render() {
            const cont = document.getElementById('container');
            cont.innerHTML = '';
            Object.keys(data).forEach(name => {
                const group = document.createElement('div');
                group.className = 'group-card';
                group.innerHTML = `<div class="bg-zinc-900/50 px-4 py-2 text-[10px] font-bold text-pink-500 border-b border-zinc-800 uppercase">${name}</div>`;
                data[name].forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    row.innerHTML = `
                        <span class="text-sm text-zinc-300">${item.text}</span>
                        <button onclick="deleteItem('${name}', ${item.id})" class="text-zinc-800 hover:text-red-500 text-lg">&times;</button>
                    `;
                    group.appendChild(row);
                });
                cont.appendChild(group);
            });
        }

        window.onload = render;
        const manifest = { "name": "Wish Catcher", "short_name": "Wishes", "start_url": "wish.html", "display": "standalone", "theme_color": "#be185d" };
        document.getElementById('pwa-manifest').setAttribute('href', 'data:application/json;base64,' + btoa(JSON.stringify(manifest)));
    </script>
</body>
</html>
