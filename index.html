<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Breadcrumbs Stack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .compass-arrow { transition: transform 0.3s ease-out; filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5)); }
        .loading-spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .crumb-node { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
    
    <!-- PWA Manifest -->
    <script id="pwa-manifest" type="application/json">
    {
        "name": "Breadcrumbs Stack",
        "short_name": "Breadcrumbs",
        "start_url": ".",
        "display": "standalone",
        "background_color": "#0f172a",
        "theme_color": "#0f172a",
        "icons": [
            {
                "src": "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2338bdf8'%3E%3Cpath d='M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z'/%3E%3C/svg%3E",
                "sizes": "192x192",
                "type": "image/svg+xml"
            }
        ]
    }
    </script>
</head>
<body class="flex flex-col items-center justify-between h-screen p-6">

    <div class="w-full text-center mt-4">
        <h1 class="text-2xl font-black tracking-tighter text-sky-400">BREADCRUMBS</h1>
        <div id="stackCount" class="text-[10px] bg-sky-900/50 text-sky-300 px-2 py-0.5 rounded-full inline-block mt-1 font-bold">STACK EMPTY</div>
    </div>

    <!-- Main Navigation Area -->
    <div id="navView" class="hidden flex flex-col items-center justify-center flex-1 w-full">
        <div class="relative w-56 h-56 flex items-center justify-center rounded-full border-4 border-slate-800 bg-slate-900/30">
            <svg id="arrow" class="compass-arrow w-28 h-28 text-sky-400" fill="currentColor" viewBox="0 0 24 24">
                <path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/>
            </svg>
            <div id="targetLabel" class="absolute -top-4 bg-sky-500 text-slate-900 font-black px-3 py-1 rounded-md text-sm">POINT C</div>
        </div>
        
        <div class="mt-8 text-center">
            <div id="distance" class="text-6xl font-mono font-bold tracking-tighter">0m</div>
            <div class="text-slate-500 uppercase text-[10px] mt-1 font-bold tracking-widest">To Next Breadcrumb</div>
        </div>
    </div>

    <!-- Empty State -->
    <div id="emptyView" class="flex flex-col items-center justify-center text-center flex-1">
        <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
        </div>
        <p class="text-slate-500 text-sm font-medium">No path recorded yet.</p>
    </div>

    <!-- Controls -->
    <div class="w-full max-w-sm space-y-3 mb-6">
        <div class="grid grid-cols-2 gap-3">
            <button id="dropBtn" class="col-span-2 flex items-center justify-center py-5 bg-sky-600 hover:bg-sky-500 active:scale-95 text-white font-black rounded-2xl transition-all text-lg shadow-xl shadow-sky-900/20">
                <span id="btnText">DROP CRUMB</span>
                <div id="btnSpinner" class="loading-spinner hidden ml-3"></div>
            </button>
            
            <button id="pickUpBtn" class="hidden flex flex-col items-center justify-center py-3 bg-emerald-600 text-white font-bold rounded-2xl active:scale-95 transition-all">
                <span class="text-xs opacity-80 uppercase">Arrived</span>
                <span>PICK UP</span>
            </button>
            
            <button id="clearBtn" class="hidden flex items-center justify-center py-3 bg-slate-800 text-slate-400 font-bold rounded-2xl border border-slate-700 active:scale-95 transition-all">
                CLEAR ALL
            </button>
        </div>
    </div>

    <div id="statusBar" class="text-[10px] text-slate-500 uppercase mb-2 font-mono">
        Ready
    </div>

    <script>
        // PWA Setup
        const manifestContent = document.getElementById('pwa-manifest').textContent;
        const manifestBlob = new Blob([manifestContent], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(manifestBlob);
        const manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = manifestURL;
        document.head.appendChild(manifestLink);

        // Service Worker inline
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            const swURL = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swURL).catch(err => console.log('SW failed', err));
        }

        // App Logic
        let breadcrumbs = JSON.parse(localStorage.getItem('breadcrumbs_stack')) || []; 
        let currentCoords = null;
        let watchId = null;

        const labels = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        const dropBtn = document.getElementById('dropBtn');
        const pickUpBtn = document.getElementById('pickUpBtn');
        const clearBtn = document.getElementById('clearBtn');
        const navView = document.getElementById('navView');
        const emptyView = document.getElementById('emptyView');
        const targetLabel = document.getElementById('targetLabel');
        const distanceEl = document.getElementById('distance');
        const arrowEl = document.getElementById('arrow');
        const stackCount = document.getElementById('stackCount');
        const statusBar = document.getElementById('statusBar');

        function saveState() {
            localStorage.setItem('breadcrumbs_stack', JSON.stringify(breadcrumbs));
        }

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function calculateBearing(lat1, lon1, lat2, lon2) {
            const y = Math.sin((lon2 - lon1) * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180);
            const x = Math.cos(lat1 * Math.PI / 180) * Math.sin(lat2 * Math.PI / 180) -
                      Math.sin(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.cos((lon2 - lon1) * Math.PI / 180);
            return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
        }

        function updateUI() {
            const count = breadcrumbs.length;
            stackCount.innerText = count > 0 ? `${count} CRUMBS DROPPED` : "STACK EMPTY";
            
            if (count > 0) {
                emptyView.classList.add('hidden');
                navView.classList.remove('hidden');
                pickUpBtn.classList.remove('hidden');
                clearBtn.classList.remove('hidden');
                
                const target = breadcrumbs[count - 1];
                targetLabel.innerText = `POINT ${target.label}`;

                if (currentCoords) {
                    const dist = calculateDistance(currentCoords.latitude, currentCoords.longitude, target.lat, target.lon);
                    const bearing = calculateBearing(currentCoords.latitude, currentCoords.longitude, target.lat, target.lon);
                    distanceEl.innerText = dist > 1000 ? (dist/1000).toFixed(2) + 'km' : Math.round(dist) + 'm';
                    arrowEl.style.transform = `rotate(${bearing}deg)`;
                }
            } else {
                emptyView.classList.remove('hidden');
                navView.classList.add('hidden');
                pickUpBtn.classList.add('hidden');
                clearBtn.classList.add('hidden');
            }
        }

        async function getGPS() {
            return new Promise((resolve, reject) => {
                navigator.geolocation.getCurrentPosition(resolve, reject, {
                    enableHighAccuracy: true, 
                    timeout: 15000, // Aumentado a 15s
                    maximumAge: 5000 // Acepta caché de hasta 5s para mayor velocidad
                });
            });
        }

        dropBtn.addEventListener('click', async () => {
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            btnText.innerText = "DROPPING...";
            btnSpinner.classList.remove('hidden');

            try {
                let pos;
                try {
                    pos = await getGPS();
                } catch (gpsError) {
                    // Si el GPS falla por timeout pero tenemos una ubicación reciente del watchPosition, usar esa
                    if (gpsError.code === 3 && currentCoords) {
                        pos = { coords: currentCoords };
                        statusBar.innerText = "USING LAST KNOWN POS (TIMEOUT)";
                    } else {
                        throw gpsError;
                    }
                }

                currentCoords = pos.coords;
                const label = labels[breadcrumbs.length % labels.length];
                breadcrumbs.push({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    label: label
                });
                saveState();
                if (statusBar.innerText !== "USING LAST KNOWN POS (TIMEOUT)") {
                    statusBar.innerText = `DROPPED ${label} (ACC: ±${Math.round(pos.coords.accuracy)}M)`;
                }
                updateUI();
                startContinuousTracking();
            } catch (err) {
                statusBar.innerText = "GPS ERROR: " + err.message;
            } finally {
                btnText.innerText = "DROP CRUMB";
                btnSpinner.classList.add('hidden');
            }
        });

        pickUpBtn.addEventListener('click', () => {
            if (breadcrumbs.length > 0) {
                const removed = breadcrumbs.pop();
                saveState();
                statusBar.innerText = `PICKED UP ${removed.label}`;
                updateUI();
            }
        });

        clearBtn.addEventListener('click', () => {
            if (confirm("Clear all breadcrumbs? This cannot be undone.")) {
                breadcrumbs = [];
                saveState();
                if (watchId) navigator.geolocation.clearWatch(watchId);
                updateUI();
                statusBar.innerText = "ALL CRUMBS CLEARED";
            }
        });

        function startContinuousTracking() {
            if (watchId) navigator.geolocation.clearWatch(watchId);
            watchId = navigator.geolocation.watchPosition((pos) => {
                currentCoords = pos.coords;
                updateUI();
            }, (err) => {
                statusBar.innerText = "TRACKING ERROR: " + err.message;
            }, { 
                enableHighAccuracy: true,
                maximumAge: 2000 
            });
        }

        window.addEventListener('load', () => {
            updateUI();
            if (breadcrumbs.length > 0) {
                statusBar.innerText = "RESUMING PATH...";
                startContinuousTracking();
            }
        });
    </script>
</body>
</html>
